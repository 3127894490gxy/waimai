<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的订单 - 外卖配送系统</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: #f5f5f5; }
        .navbar { background: linear-gradient(135deg, #ff6b35, #f7931e); color: #fff; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 60px; position: sticky; top: 0; z-index: 100; }
        .navbar a { color: #fff; text-decoration: none; }
        .navbar .logo { font-size: 20px; font-weight: bold; }
        .container { max-width: 800px; margin: 0 auto; padding: 24px; }
        .page-title { font-size: 22px; font-weight: bold; color: #333; margin-bottom: 20px; }
        .order-card { background: #fff; border-radius: 12px; margin-bottom: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); overflow: hidden; }
        .order-card .header { padding: 16px 20px 8px; display: flex; justify-content: space-between; align-items: center; }
        .order-card .header .order-no { font-size: 13px; color: #999; }
        .order-card .header .status { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .order-card .header .status.pending { background: #fff3e0; color: #ff8c00; }
        .order-card .header .status.paid { background: #e8f5e9; color: #43a047; }
        .order-card .header .status.delivering { background: #e3f2fd; color: #1976d2; }
        .order-card .header .status.completed { background: #e8f5e9; color: #2e7d32; }
        .order-card .header .status.cancelled { background: #fce4ec; color: #c62828; }
        .order-card .body { padding: 8px 20px 16px; }
        .order-card .body .item-row { display: flex; justify-content: space-between; font-size: 14px; color: #555; padding: 4px 0; }
        .order-card .body .total { text-align: right; font-size: 18px; font-weight: bold; color: #ff6b35; margin-top: 8px; padding-top: 8px; border-top: 1px solid #f0f0f0; }
        .order-card .footer { background: #fafafa; padding: 10px 20px; display: flex; justify-content: space-between; font-size: 13px; color: #999; }
        .order-card .footer .rest-name { color: #ff6b35; }
        .empty { text-align: center; padding: 80px 20px; color: #999; }
        .empty .icon { font-size: 64px; margin-bottom: 16px; }
        .empty a { display: inline-block; margin-top: 16px; padding: 10px 24px; background: #ff6b35; color: #fff; text-decoration: none; border-radius: 6px; }
        .loading { text-align: center; padding: 40px; color: #999; }
        .status-translate { 'PENDING_PAYMENT': '待支付', 'PAID': '已支付', 'ACCEPTED': '已接单', 'PREPARING': '准备中', 'DELIVERING': '配送中', 'DELIVERED': '已送达', 'COMPLETED': '已完成', 'CANCELLED': '已取消' }
    </style>
</head>
<body>
    <div class="food-bg">
        <span>🍜</span><span>🥟</span><span>🍕</span><span>🌮</span>
        <span>🍣</span><span>🥘</span><span>🍦</span><span>🧋</span>
    </div>
    <nav class="navbar">
        <a href="/" class="logo">← 返回首页</a>
        <a href="/cart.html">🛒 购物车</a>
    </nav>
    <div class="container">
        <div class="page-title">📋 我的订单</div>
        <div id="orderList">
            <div class="loading">加载中...</div>
        </div>
    </div>
    <script>
        function getCurrentUser() {
            const u = localStorage.getItem('waimai_user');
            return u ? JSON.parse(u) : null;
        }

        const statusMap = {
            'PENDING_PAYMENT': { text: '待支付', cls: 'pending', step: 0 },
            'PAID': { text: '已支付', cls: 'paid', step: 1 },
            'ACCEPTED': { text: '商家已接单', cls: 'paid', step: 2 },
            'PREPARING': { text: '准备中', cls: 'delivering', step: 2 },
            'DELIVERING': { text: '配送中', cls: 'delivering', step: 3 },
            'DELIVERED': { text: '已送达', cls: 'completed', step: 4 },
            'COMPLETED': { text: '已完成', cls: 'completed', step: 5 },
            'CANCELLED': { text: '已取消', cls: 'cancelled', step: -1 }
        };

        function loadOrders() {
            const user = getCurrentUser();
            const el = document.getElementById('orderList');
            if (!user) { el.innerHTML = '<div class="empty"><div class="icon">🔐</div><p>请先登录查看订单</p><a href="/login.html">去登录</a></div>'; return; }

            fetch(`/api/orders/user/${user.id}`).then(r => r.json()).then(resp => {
                if (resp.code !== 200 || !resp.data || resp.data.length === 0) {
                    el.innerHTML = '<div class="empty"><div class="icon">📋</div><p>暂无订单</p><a href="/">去点餐</a></div>';
                    return;
                }

                // 为每个订单加载餐厅名称和订单项
                const promises = resp.data.map(order => {
                    const st = statusMap[order.status] || { text: order.status, cls: '' };
                    // 获取餐厅名
                    return fetch(`/api/restaurants/${order.restaurantId}`).then(r => r.json()).then(resp2 => {
                        const restName = resp2.data ? resp2.data.name : '餐厅#' + order.restaurantId;
                        // 获取订单项
                        return fetch(`/api/orders/${order.id}/items`).then(r => r.json()).then(resp3 => {
                            const items = resp3.data || [];
                            const itemsHtml = items.map(item => 
                                `<div class="item-row"><span>${item.dishName} × ${item.quantity}</span><span>¥${(item.price * item.quantity).toFixed(2)}</span></div>`
                            ).join('');
                            return { order, restName, itemsHtml, st };
                        });
                    });
                });

                Promise.all(promises).then(results => {
                    el.innerHTML = results.map(({ order, restName, itemsHtml, st }) => `
                        <div class="order-card card-enter">
                            <div class="header">
                                <span class="order-no">🆔 ${order.orderNo}</span>
                                <span class="status ${st.cls}">${st.text}</span>
                            </div>
                            <div class="body">
                                ${itemsHtml}
                                ${st.step > 0 && st.step < 5 ? `
                                <div style="display:flex;gap:8px;justify-content:center;padding:12px 0 4px;border-top:1px solid #f5f5f5;margin-top:8px;">
                                    ${['💳','👨‍🍳','🚚','✅'].map((icon,i) => `
                                        <div style="display:flex;align-items:center;gap:4px;">
                                            <span style="font-size:18px;opacity:${i+1 <= st.step ? 1 : 0.3};">${icon}</span>
                                            ${i < 3 ? '<span style="color:'+(i+1 < st.step ? '#ff6b35' : '#eee')+';">━━</span>' : ''}
                                        </div>
                                    `).join('')}
                                </div>
                                ` : ''}
                                ${order.deliveryId ? `
                                <div id="deliveryInfo_${order.id}" style="margin-top:10px;padding:10px 14px;background:#f0f8ff;border-radius:8px;border-left:3px solid #4a90d9;font-size:13px;">
                                    <div style="display:flex;align-items:center;justify-content:space-between;">
                                        <span style="font-weight:bold;color:#4a90d9;">🚚 配送员信息</span>
                                        <span id="delPhone_${order.id}" style="color:#999;">加载中...</span>
                                    </div>
                                    <div style="margin-top:4px;display:flex;align-items:center;gap:10px;">
                                        <span style="color:#333;" id="delName_${order.id}">${order.deliveryName || '配送员'}</span>
                                        <a id="delCallBtn_${order.id}" style="display:none;padding:4px 14px;background:#4a90d9;color:#fff;border-radius:20px;text-decoration:none;font-size:12px;" href="tel:">📞 联系配送员</a>
                                    </div>
                                </div>
                                ` : ''}
                                <div class="total">合计 ¥${order.totalAmount ? order.totalAmount.toFixed(2) : '0.00'}</div>
                            </div>
                            <div class="footer">
                                <span class="rest-name">🏪 ${restName}</span>
                                <span>${new Date(order.createTime).toLocaleString('zh-CN')}</span>
                            </div>
                        </div>
                    `).join('');

                // 为每个有配送员的订单加载配送员电话
                results.forEach(({ order }) => {
                    if (order.deliveryId) {
                        loadDeliveryPhone(order.id, order.deliveryId, order.deliveryName);
                    }
                });
                });
            }).catch(() => {
                el.innerHTML = '<div class="empty"><div class="icon">⚠️</div><p>加载失败，请确认后端已启动</p></div>';
            });
        }

        // ===== 加载配送员电话 =====
        function loadDeliveryPhone(orderId, deliveryId, deliveryName) {
            if (!deliveryId) return;
            fetch(`/api/users/${deliveryId}`).then(r => r.json()).then(resp => {
                if (resp.code === 200 && resp.data) {
                    const phone = resp.data.phone;
                    const nameEl = document.getElementById('delName_' + orderId);
                    const phoneEl = document.getElementById('delPhone_' + orderId);
                    const callBtn = document.getElementById('delCallBtn_' + orderId);
                    if (nameEl) nameEl.textContent = deliveryName || resp.data.nickname || '配送员';
                    if (phone && phoneEl) {
                        phoneEl.textContent = '📞 ' + phone;
                        if (callBtn) {
                            callBtn.href = 'tel:' + phone;
                            callBtn.style.display = 'inline-block';
                        }
                    } else if (phoneEl) {
                        phoneEl.textContent = '暂无电话';
                    }
                }
            }).catch(() => {});
        }

        loadOrders();
    </script>
</body>
</html>
