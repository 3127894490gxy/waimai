<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 外卖配送系统</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-box { background: #fff; border-radius: 16px; padding: 40px; width: 400px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
        .login-box h2 { text-align: center; font-size: 24px; color: #333; margin-bottom: 8px; }
        .login-box .subtitle { text-align: center; color: #999; font-size: 14px; margin-bottom: 32px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 14px; color: #666; margin-bottom: 6px; }
        .form-group input { width: 100%; padding: 12px 16px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 15px; outline: none; transition: border 0.2s; }
        .form-group input:focus { border-color: #ff6b35; }
        .btn { width: 100%; padding: 12px; background: #ff6b35; color: #fff; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; transition: background 0.2s; }
        .btn:hover { background: #e55a2b; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .error { color: #e74c3c; font-size: 13px; margin-bottom: 12px; display: none; }
        .footer { text-align: center; margin-top: 20px; font-size: 14px; color: #999; }
        .footer a { color: #ff6b35; text-decoration: none; }
        .back { position: absolute; top: 20px; left: 20px; color: #666; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <a href="/" class="back">← 返回首页</a>
    <div class="login-box">
        <h2>🔐 登录</h2>
        <div class="subtitle">登录后即可点餐 · 配送 · 管理</div>
        <div class="error" id="errorMsg"></div>
        <div class="form-group">
            <label>用户名</label>
            <input type="text" id="username" placeholder="请输入用户名" autocomplete="username">
        </div>
        <div class="form-group">
            <label>密码</label>
            <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password" onkeyup="if(event.key==='Enter') login()">
        </div>
        <button class="btn" id="loginBtn" onclick="login()">登 录</button>
        <div class="footer">还没有账号？<a href="/register.html">立即注册</a></div>
    </div>
    <script>
        function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const errEl = document.getElementById('errorMsg');
            const btn = document.getElementById('loginBtn');
            if (!username || !password) { errEl.textContent = '请输入用户名和密码'; errEl.style.display = 'block'; return; }
            errEl.style.display = 'none';
            btn.disabled = true; btn.textContent = '登录中...';
            fetch('/api/users/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            }).then(r => r.json()).then(resp => {
                if (resp.code === 200 && resp.data) {
                    localStorage.setItem('waimai_user', JSON.stringify(resp.data));
                    // 根据角色跳转不同页面
                    const role = resp.data.role;
                    const redirectParam = new URLSearchParams(location.search).get('redirect');
                    if (redirectParam && !redirectParam.startsWith('/rider.html')) {
                        location.href = redirectParam;
                    } else if (role === 'DELIVERY') {
                        location.href = '/rider.html';
                    } else if (role === 'ADMIN') {
                        location.href = '/admin.html';
                    } else {
                        location.href = '/';
                    }
                } else {
                    errEl.textContent = resp.message || '用户名或密码错误';
                    errEl.style.display = 'block';
                    btn.disabled = false; btn.textContent = '登 录';
                }
            }).catch(() => {
                errEl.textContent = '网络错误，请确认后端已启动';
                errEl.style.display = 'block';
                btn.disabled = false; btn.textContent = '登 录';
            });
        }
    </script>
</body>
</html>
