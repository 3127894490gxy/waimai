<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>配送工作台 - 外卖配送系统</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: #f0f8ff; }
        .navbar { background: linear-gradient(135deg, #4a90d9, #357abd); color: #fff; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 60px; box-shadow: 0 2px 12px rgba(74,144,217,0.3); position: sticky; top: 0; z-index: 100; }
        .navbar .logo { font-size: 20px; font-weight: bold; text-decoration: none; color: #fff; }
        .navbar .nav-right a { color: rgba(255,255,255,0.9); text-decoration: none; margin-left: 16px; font-size: 14px; }
        .container { max-width: 1000px; margin: 0 auto; padding: 24px; }
        .page-title { font-size: 22px; font-weight: bold; color: #333; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; }
        .page-title .delivery-info { font-size: 14px; font-weight: normal; color: #4a90d9; background: #e8f4fd; padding: 6px 16px; border-radius: 20px; }
        .tabs { display: flex; gap: 4px; margin-bottom: 20px; background: #fff; border-radius: 10px; padding: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .tabs .tab { flex: 1; padding: 12px; text-align: center; border: none; background: transparent; border-radius: 8px; cursor: pointer; font-size: 15px; color: #666; transition: all 0.2s; }
        .tabs .tab:hover { background: #f0f8ff; }
        .tabs .tab.active { background: #4a90d9; color: #fff; font-weight: bold; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .stats { display: flex; gap: 16px; margin-bottom: 20px; }
        .stat-card { flex: 1; background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); text-align: center; }
        .stat-card .num { font-size: 32px; font-weight: bold; color: #4a90d9; }
        .stat-card .label { font-size: 13px; color: #999; margin-top: 4px; }
        .order-card { background: #fff; border-radius: 12px; margin-bottom: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); overflow: hidden; transition: transform 0.2s; }
        .order-card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
        .order-card .header { padding: 14px 20px 6px; display: flex; justify-content: space-between; align-items: center; }
        .order-card .header .order-no { font-size: 14px; font-weight: bold; color: #333; }
        .order-card .header .amount { font-size: 18px; font-weight: bold; color: #ff6b35; }
        .order-card .body { padding: 6px 20px 14px; }
        .order-card .body .info-row { display: flex; gap: 20px; font-size: 13px; color: #888; padding: 3px 0; }
        .order-card .body .info-row strong { color: #555; min-width: 60px; }
        .order-card .body .items { margin-top: 8px; padding-top: 8px; border-top: 1px solid #f5f5f5; font-size: 13px; color: #666; }
        .order-card .footer { background: #fafafa; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; }
        .order-card .footer .time { font-size: 12px; color: #999; }
        .btn { padding: 8px 24px; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; transition: all 0.2s; font-weight: bold; }
        .btn-primary { background: #4a90d9; color: #fff; }
        .btn-primary:hover { background: #357abd; transform: scale(1.02); }
        .btn-success { background: #27ae60; color: #fff; }
        .btn-success:hover { background: #219a52; transform: scale(1.02); }
        .btn-warning { background: #f39c12; color: #fff; }
        .btn-warning:hover { background: #d68910; transform: scale(1.02); }
        .btn-secondary { background: #95a5a6; color: #fff; }
        .btn-secondary:hover { background: #7f8c8d; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }
        .empty { text-align: center; padding: 60px 20px; color: #999; }
        .empty .icon { font-size: 64px; margin-bottom: 16px; }
        .loading { text-align: center; padding: 40px; color: #999; }
        .badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; }
        .badge.pending { background: #fff3e0; color: #e67e22; }
        .badge.delivering { background: #e3f2fd; color: #1976d2; }
        .badge.done { background: #e8f5e9; color: #27ae60; }
        .toast { position: fixed; top: 20px; right: 20px; padding: 14px 24px; border-radius: 8px; color: #fff; font-size: 14px; z-index: 300; display: none; animation: slideDown 0.3s; }
        .toast.success { background: #27ae60; }
        .toast.error { background: #e74c3c; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/" class="logo">🚚 配送工作台</a>
        <div class="nav-right">
            <a href="/orders.html">📋 我的订单</a>
            <a href="#" onclick="showPwdModal();return false;" style="color:rgba(255,255,255,0.8);">🔑 修改密码</a>
            <a href="/" onclick="logout()">🚪 退出</a>
        </div>
    </nav>
    <div class="container">
        <div class="page-title">
                🚚 配送管理
                <span class="delivery-info" id="deliveryInfo">未登录</span>
            </div>
            <div class="stats">
                <div class="stat-card"><div class="num" id="pendingCount">0</div><div class="label">待接单</div></div>
                <div class="stat-card"><div class="num" id="myDeliveringCount">0</div><div class="label">配送中</div></div>
                <div class="stat-card"><div class="num" id="myDoneCount">0</div><div class="label">已送达</div></div>
            </div>

        <!-- 标签 -->
        <div class="tabs">
            <button class="tab active" onclick="switchTab('pending')">📋 待接单</button>
            <button class="tab" onclick="switchTab('mine')">🚚 我的配送</button>
        </div>

        <!-- 待接单 -->
        <div class="tab-content active" id="tab-pending">
            <div id="pendingList"><div class="loading">加载中...</div></div>
        </div>

        <!-- 我的配送 -->
        <div class="tab-content" id="tab-mine">
            <div id="mineList"><div class="loading">加载中...</div></div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <!-- 修改密码弹窗 -->
    <div style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.4);z-index:200;align-items:center;justify-content:center;" id="pwdModal" onclick="if(event.target===this)closePwdModal()">
        <div style="background:#fff;border-radius:12px;padding:24px;width:380px;max-width:90vw;box-shadow:0 8px 32px rgba(0,0,0,0.2);">
            <h3 style="margin-bottom:16px;color:#333;">🔑 修改密码</h3>
            <div style="margin-bottom:12px;"><label style="font-size:13px;color:#666;display:block;margin-bottom:4px;">原密码</label><input type="password" id="pwd_old" style="width:100%;padding:10px 14px;border:1px solid #e0e0e0;border-radius:6px;font-size:14px;outline:none;"></div>
            <div style="margin-bottom:12px;"><label style="font-size:13px;color:#666;display:block;margin-bottom:4px;">新密码</label><input type="password" id="pwd_new" style="width:100%;padding:10px 14px;border:1px solid #e0e0e0;border-radius:6px;font-size:14px;outline:none;"></div>
            <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px;">
                <button onclick="closePwdModal()" style="padding:8px 20px;border:none;border-radius:6px;background:#95a5a6;color:#fff;cursor:pointer;">取消</button>
                <button onclick="changePwd()" style="padding:8px 20px;border:none;border-radius:6px;background:#4a90d9;color:#fff;cursor:pointer;">确认修改</button>
            </div>
            <div id="pwdMsg" style="margin-top:10px;font-size:13px;color:#e74c3c;display:none;"></div>
        </div>
    </div>

    <script>
        function getCurrentUser() {
            const u = localStorage.getItem('waimai_user');
            return u ? JSON.parse(u) : null;
        }

        function checkDelivery() {
            const user = getCurrentUser();
            if (!user || user.role !== 'DELIVERY') {
                alert('请用配送员账号登录！\n默认配送员: delivery1 / 123456');
                location.href = '/login.html?redirect=/delivery.html';
                return null;
            }
            document.getElementById('deliveryInfo').textContent = '👤 ' + (user.nickname || user.username);
            return user;
        }

        function toast(msg, type) {
            const el = document.getElementById('toast');
            el.textContent = msg; el.className = 'toast ' + type; el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 2500);
        }

        function logout() {
            localStorage.removeItem('waimai_user');
            location.href = '/';
        }

        // ===== 修改密码 =====
        function showPwdModal() { document.getElementById('pwdModal').style.display = 'flex'; document.getElementById('pwd_old').value = ''; document.getElementById('pwd_new').value = ''; document.getElementById('pwdMsg').style.display = 'none'; }
        function closePwdModal() { document.getElementById('pwdModal').style.display = 'none'; }
        function changePwd() {
            const u = getCurrentUser();
            const oldPwd = document.getElementById('pwd_old').value.trim();
            const newPwd = document.getElementById('pwd_new').value.trim();
            const msg = document.getElementById('pwdMsg');
            if (!oldPwd || !newPwd) { msg.textContent = '请填写完整'; msg.style.display = 'block'; return; }
            fetch('/api/users/password', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userId: u.id, oldPassword: oldPwd, newPassword: newPwd }) })
            .then(r => r.json()).then(resp => {
                if (resp.code === 200) { alert('✅ 修改成功，请重新登录'); logout(); }
                else { msg.textContent = resp.message || '修改失败'; msg.style.display = 'block'; }
            }).catch(() => { msg.textContent = '网络错误'; msg.style.display = 'block'; });
        }

        function switchTab(name) {
            document.querySelectorAll('.tab, .tab-content').forEach(el => el.classList.remove('active'));
            document.querySelector(`.tab[onclick*="'${name}'"]`).classList.add('active');
            document.getElementById('tab-' + name).classList.add('active');
            if (name === 'pending') loadPendingOrders();
            if (name === 'mine') loadMyOrders();
        }

        const user = checkDelivery();
        if (!user) throw new Error('not authorized');

        // ===== 待接单 =====
        function loadPendingOrders() {
            fetch('/api/orders/delivery/pending').then(r => r.json()).then(resp => {
                const list = document.getElementById('pendingList');
                const count = document.getElementById('pendingCount');
                if (resp.code !== 200 || !resp.data || resp.data.length === 0) {
                    list.innerHTML = '<div class="empty"><div class="icon">📋</div><p>暂无待配送订单</p></div>';
                    count.textContent = '0';
                    return;
                }
                count.textContent = resp.data.length;
                list.innerHTML = resp.data.map(o => orderCardHtml(o, 'pending')).join('');
            }).catch(() => {
                document.getElementById('pendingList').innerHTML = '<div class="empty"><div class="icon">⚠️</div><p>加载失败</p></div>';
            });
        }

        // ===== 我的配送 =====
        function loadMyOrders() {
            Promise.all([
                fetch(`/api/orders/delivery/${user.id}`).then(r => r.json()),
                fetch('/api/orders/delivery/pending').then(r => r.json())
            ]).then(([myResp]) => {
                const list = document.getElementById('mineList');
                if (myResp.code !== 200 || !myResp.data || myResp.data.length === 0) {
                    list.innerHTML = '<div class="empty"><div class="icon">🚚</div><p>暂无配送任务</p></div>';
                    document.getElementById('myDeliveringCount').textContent = '0';
                    document.getElementById('myDoneCount').textContent = '0';
                    return;
                }
                const delivering = myResp.data.filter(o => o.status === 'DELIVERING');
                const done = myResp.data.filter(o => o.status === 'DELIVERED' || o.status === 'COMPLETED');
                document.getElementById('myDeliveringCount').textContent = delivering.length;
                document.getElementById('myDoneCount').textContent = done.length;
                const allOrders = [...delivering, ...done];
                if (allOrders.length === 0) {
                    list.innerHTML = '<div class="empty"><div class="icon">🚚</div><p>暂无配送任务</p></div>';
                    return;
                }
                list.innerHTML = allOrders.map(o => orderCardHtml(o, 'mine')).join('');
            });
        }

        // ===== 生成订单卡片 =====
        function orderCardHtml(order, mode) {
            const isPending = mode === 'pending';
            const isDelivering = order.status === 'DELIVERING';
            const isDone = order.status === 'DELIVERED' || order.status === 'COMPLETED';

            const statusBadge = isPending ? '<span class="badge pending">待接单</span>'
                : isDelivering ? '<span class="badge delivering">配送中</span>'
                : '<span class="badge done">已送达</span>';

            const actionBtn = isPending
                ? `<button class="btn btn-primary" onclick="claimOrder(${order.id})">📥 接单</button>`
                : isDelivering
                ? `<button class="btn btn-success" onclick="deliverDone(${order.id})">✅ 已送达</button>`
                : `<button class="btn btn-secondary" disabled>✅ 已完成</button>`;

            return `
                <div class="order-card card-enter">
                    <div class="header">
                        <span class="order-no">🆔 ${order.orderNo}</span>
                        <span class="amount">¥${order.totalAmount ? order.totalAmount.toFixed(2) : '0.00'}</span>
                    </div>
                    <div class="body">
                        <div class="info-row"><strong>📍 地址</strong><span>${order.deliveryAddress || '未填写'}</span></div>
                        <div class="info-row"><strong>👤 联系人</strong><span>${order.contactName || '未填写'} ${order.contactPhone ? '📞' + order.contactPhone : ''}</span></div>
                        <div class="info-row"><strong>📝 备注</strong><span>${order.remark || '无'}</span></div>
                        <div class="info-row"><strong>📊 状态</strong>${statusBadge}</div>
                        ${!isPending ? '<div class="info-row"><strong>⏱ 配送耗时</strong><span>' + calcDuration(order.pickupTime, order.deliveredTime) + '</span></div>' : ''}
                        <div class="items" id="items_${order.id}">⏳ 加载菜品...</div>
                    </div>
                    <div class="footer">
                        <span class="time">⏰ ${order.createTime ? new Date(order.createTime).toLocaleString('zh-CN') : ''}</span>
                        ${actionBtn}
                    </div>
                </div>
            `;
        }

        // ===== 加载订单菜品 =====
        function loadOrderItems(orderId, callback) {
            fetch(`/api/orders/${orderId}/items`).then(r => r.json()).then(resp => {
                const itemsEl = document.getElementById('items_' + orderId);
                if (resp.code === 200 && resp.data && resp.data.length > 0) {
                    itemsEl.innerHTML = '🍽️ ' + resp.data.map(i => `${i.dishName} × ${i.quantity}`).join('、');
                } else {
                    itemsEl.innerHTML = '';
                }
                if (callback) callback();
            });
        }

        // 页面加载完成后，为每个订单卡片加载菜品
        document.addEventListener('DOMContentLoaded', function() {
            // 监听 tab 切换和列表加载完成
            const observer = new MutationObserver(function() {
                document.querySelectorAll('[id^="items_"]').forEach(el => {
                    if (el.textContent === '⏳ 加载菜品...') {
                        const id = el.id.replace('items_', '');
                        loadOrderItems(parseInt(id));
                    }
                });
            });
            observer.observe(document.getElementById('pendingList'), { childList: true, subtree: true });
            observer.observe(document.getElementById('mineList'), { childList: true, subtree: true });
        });

        // ===== 接单（配送员自己认领） =====
        function claimOrder(orderId) {
            if (!confirm('确认接单？')) return;
            fetch(`/api/orders/${orderId}/assign-delivery`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ deliveryId: user.id, deliveryName: user.nickname || user.username })
            }).then(r => r.json()).then(resp => {
                if (resp.code === 200) {
                    toast('✅ 接单成功！请前往配送', 'success');
                    loadPendingOrders();
                } else {
                    toast('接单失败，可能已被其他配送员接走', 'error');
                    loadPendingOrders();
                }
            }).catch(() => toast('网络错误', 'error'));
        }

        // ===== 送达 =====
        function deliverDone(orderId) {
            if (!confirm('确认已送达？')) return;
            fetch(`/api/orders/${orderId}/status`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: 'DELIVERED' })
            }).then(r => r.json()).then(resp => {
                if (resp.code === 200) {
                    toast('✅ 已标记为送达！', 'success');
                    loadMyOrders();
                } else {
                    toast('操作失败', 'error');
                }
            }).catch(() => toast('网络错误', 'error'));
        }

        // ===== 初始化加载 =====
        loadPendingOrders();

        // 配送耗时计算
        function calcDuration(pickupTime, deliveredTime) {
            if (!pickupTime) return '⌛ 等待接单';
            const start = new Date(pickupTime).getTime();
            const end = deliveredTime ? new Date(deliveredTime).getTime() : Date.now();
            const diff = Math.floor((end - start) / 1000);
            if (diff < 0) return '--';
            if (diff < 60) return diff + '秒';
            const mins = Math.floor(diff / 60);
            const secs = diff % 60;
            if (mins < 60) return mins + '分' + secs + '秒';
            const hours = Math.floor(mins / 60);
            return hours + '时' + (mins % 60) + '分';
        }
    </script>
</body>
</html>
