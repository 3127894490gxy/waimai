<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>鐧诲綍 - 澶栧崠閰嶉€佺郴缁?/title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-box { background: #fff; border-radius: 16px; padding: 40px; width: 400px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
        .login-box h2 { text-align: center; font-size: 24px; color: #333; margin-bottom: 8px; }
        .login-box .subtitle { text-align: center; color: #999; font-size: 14px; margin-bottom: 32px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 14px; color: #666; margin-bottom: 6px; }
        .form-group input { width: 100%; padding: 12px 16px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 15px; outline: none; transition: border 0.2s; }
        .form-group input:focus { border-color: #4a90d9; }
        .btn { width: 100%; padding: 12px; background: #4a90d9; color: #fff; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; transition: background 0.2s; }
        .btn:hover { background: #3a7bc8; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .error { color: #e74c3c; font-size: 13px; margin-bottom: 12px; display: none; }
        .footer { text-align: center; margin-top: 20px; font-size: 14px; color: #999; }
        .footer a { color: #4a90d9; text-decoration: none; }
        .back { position: absolute; top: 20px; left: 20px; color: #666; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <a href="/" class="back">鈫?杩斿洖棣栭〉</a>
    <div class="login-box">
        <h2>馃攼 鐧诲綍</h2>
        <div class="subtitle">鐧诲綍鍚庡嵆鍙偣椁?路 閰嶉€?路 绠＄悊</div>
        <div class="error" id="errorMsg"></div>
        <div class="form-group">
            <label>鐢ㄦ埛鍚?/label>
            <input type="text" id="username" placeholder="璇疯緭鍏ョ敤鎴峰悕" autocomplete="username">
        </div>
        <div class="form-group">
            <label>瀵嗙爜</label>
            <input type="password" id="password" placeholder="璇疯緭鍏ュ瘑鐮? autocomplete="current-password" onkeyup="if(event.key==='Enter') login()">
        </div>
        <button class="btn" id="loginBtn" onclick="login()">鐧?褰?/button>
        <div class="footer">杩樻病鏈夎处鍙凤紵<a href="/register.html">绔嬪嵆娉ㄥ唽</a></div>
    </div>
    <script>
        function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const errEl = document.getElementById('errorMsg');
            const btn = document.getElementById('loginBtn');
            if (!username || !password) { errEl.textContent = '璇疯緭鍏ョ敤鎴峰悕鍜屽瘑鐮?; errEl.style.display = 'block'; return; }
            errEl.style.display = 'none';
            btn.disabled = true; btn.textContent = '鐧诲綍涓?..';
            fetch('/api/users/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            }).then(r => r.json()).then(resp => {
                if (resp.code === 200 && resp.data) {
                    localStorage.setItem('waimai_user', JSON.stringify(resp.data));
                    // 鏍规嵁瑙掕壊璺宠浆涓嶅悓椤甸潰锛堥獞鎵嬩紭鍏堬級
                    const role = resp.data.role;
                    if (role === 'DELIVERY') {
                        location.href = '/rider.html';
                    } else if (role === 'ADMIN') {
                        location.href = '/admin.html';
                    } else {
                        const redirectParam = new URLSearchParams(location.search).get('redirect');
                        location.href = redirectParam || '/';
                    }
                } else {
                    errEl.textContent = resp.message || '鐢ㄦ埛鍚嶆垨瀵嗙爜閿欒';
                    errEl.style.display = 'block';
                    btn.disabled = false; btn.textContent = '鐧?褰?;
                }
            }).catch(() => {
                errEl.textContent = '缃戠粶閿欒锛岃纭鍚庣宸插惎鍔?;
                errEl.style.display = 'block';
                btn.disabled = false; btn.textContent = '鐧?褰?;
            });
        }
    </script>
</body>
</html>
