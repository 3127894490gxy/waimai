<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>外卖配送系统</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif; background: #f5f5f5; }
        .navbar { background: linear-gradient(135deg, #ff6b35, #f7931e); color: #fff; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 60px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(255,107,53,0.3); }
        .navbar .logo { font-size: 22px; font-weight: bold; text-decoration: none; color: #fff; }
        .navbar .logo span { margin-right: 8px; }
        .nav-links { display: flex; align-items: center; gap: 20px; }
        .nav-links a { color: rgba(255,255,255,0.9); text-decoration: none; font-size: 14px; padding: 8px 14px; border-radius: 6px; transition: background 0.2s; }
        .nav-links a:hover, .nav-links a.active { background: rgba(255,255,255,0.2); color: #fff; }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .user-info span { font-size: 14px; }
        .user-info a { color: #fff; text-decoration: none; font-size: 13px; padding: 6px 12px; border: 1px solid rgba(255,255,255,0.4); border-radius: 4px; }
        .user-info a:hover { background: rgba(255,255,255,0.2); }
        .user-info .dropdown { position: relative; display: inline-block; }
        .user-info .dropbtn { color: #fff; text-decoration: none; font-size: 13px; padding: 6px 12px; border: 1px solid rgba(255,255,255,0.4); border-radius: 4px; cursor: pointer; background: none; }
        .user-info .dropbtn:hover { background: rgba(255,255,255,0.2); }
        .user-info .dropdown-content { display: none; position: absolute; right: 0; top: 100%; background: #fff; min-width: 120px; border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,0.15); z-index: 200; overflow: hidden; }
        .user-info .dropdown-content a { display: block; padding: 10px 16px; color: #333 !important; border: none !important; border-radius: 0 !important; font-size: 13px; }
        .user-info .dropdown-content a:hover { background: #f5f5f5; }
        .user-info .dropdown:hover .dropdown-content { display: block; }
        .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
        .page-title { font-size: 24px; font-weight: bold; color: #333; margin-bottom: 20px; }
        .search-bar { display: flex; gap: 12px; margin-bottom: 24px; }
        .search-bar input { flex: 1; padding: 12px 16px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 15px; outline: none; transition: border 0.2s; }
        .search-bar input:focus { border-color: #ff6b35; }
        .search-bar button { padding: 12px 28px; background: #ff6b35; color: #fff; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; transition: background 0.2s; }
        .search-bar button:hover { background: #e55a2b; }
        .restaurant-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .restaurant-card { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.06); cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
        .restaurant-card:hover { transform: translateY(-4px); box-shadow: 0 6px 20px rgba(0,0,0,0.12); }
        .restaurant-card .banner { height: 140px; background: linear-gradient(135deg, #ff6b35, #ff9a56); display: flex; align-items: center; justify-content: center; font-size: 48px; }
        .restaurant-card .banner.green { background: linear-gradient(135deg, #43b581, #72d6a0); }
        .restaurant-card .banner.blue { background: linear-gradient(135deg, #4a90d9, #7bb3f0); }
        .restaurant-card .banner.purple { background: linear-gradient(135deg, #9b59b6, #c48dd6); }
        .restaurant-card .info { padding: 16px; }
        .restaurant-card .info h3 { font-size: 18px; color: #333; margin-bottom: 6px; }
        .restaurant-card .info .desc { font-size: 13px; color: #999; margin-bottom: 10px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .restaurant-card .info .meta { display: flex; align-items: center; gap: 16px; font-size: 13px; color: #888; }
        .restaurant-card .info .meta .rating { color: #ff6b35; font-weight: bold; }
        .empty { text-align: center; padding: 80px 20px; color: #999; }
        .empty .icon { font-size: 64px; margin-bottom: 16px; }
        .loading { text-align: center; padding: 40px; color: #999; }
    </style>
</head>
<body>
    <!-- 背景食物装饰 -->
    <div class="food-bg">
        <span>🍜</span><span>🥟</span><span>🍕</span><span>🌮</span>
        <span>🍣</span><span>🥘</span><span>🍦</span><span>🧋</span>
    </div>
    <nav class="navbar">
        <a href="/" class="logo"><span>🍜</span>外卖配送</a>
        <div class="nav-links">
            <a href="/" class="active">首页</a>
            <a href="/orders.html">我的订单</a>
            <a href="/cart.html">购物车</a>
            <a href="/delivery.html" id="deliveryLink" style="display:none;background:rgba(74,144,217,0.3);">🚚 配送</a>
            <a href="/admin.html" id="adminLink" style="display:none;background:rgba(255,255,255,0.15);">⚙️ 管理</a>
            <div class="user-info" id="userInfo"></div>
        </div>
    </nav>
    <div class="container">
        <div class="page-title">🍽️ 附近餐厅</div>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="搜索餐厅名称..." onkeyup="if(event.key==='Enter') searchRestaurants()">
            <button onclick="searchRestaurants()">搜索</button>
        </div>
        <div id="restaurantList">
            <div class="loading">加载中...</div>
        </div>
    </div>
    <script>
        // ===== 修改密码弹窗 =====
        const pwdModalHtml = `
            <div class="modal-overlay" id="pwdModal" style="display:none;">
                <div class="modal" style="max-width:380px;">
                    <h3>🔑 修改密码</h3>
                    <div class="form-group"><label>原密码</label><input type="password" id="pwd_old" style="width:100%;padding:10px 14px;border:1px solid #e0e0e0;border-radius:6px;font-size:14px;outline:none;"></div>
                    <div class="form-group" style="margin-top:12px;"><label>新密码</label><input type="password" id="pwd_new" style="width:100%;padding:10px 14px;border:1px solid #e0e0e0;border-radius:6px;font-size:14px;outline:none;"></div>
                    <div class="modal-actions" style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px;">
                        <button class="btn btn-secondary" onclick="closePwdModal()" style="padding:8px 20px;border:none;border-radius:6px;background:#95a5a6;color:#fff;cursor:pointer;">取消</button>
                        <button class="btn btn-primary" onclick="changePwd()" style="padding:8px 20px;border:none;border-radius:6px;background:#ff6b35;color:#fff;cursor:pointer;">确认修改</button>
                    </div>
                    <div id="pwdMsg" style="margin-top:10px;font-size:13px;color:#e74c3c;display:none;"></div>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', pwdModalHtml);

        function showPwdModal() {
            document.getElementById('pwdModal').style.display = 'flex';
            document.getElementById('pwd_old').value = '';
            document.getElementById('pwd_new').value = '';
            document.getElementById('pwdMsg').style.display = 'none';
        }
        function closePwdModal() { document.getElementById('pwdModal').style.display = 'none'; }
        function changePwd() {
            const user = getCurrentUser();
            const oldPwd = document.getElementById('pwd_old').value.trim();
            const newPwd = document.getElementById('pwd_new').value.trim();
            const msg = document.getElementById('pwdMsg');
            if (!oldPwd || !newPwd) { msg.textContent = '请填写完整'; msg.style.display = 'block'; return; }
            if (newPwd.length < 4) { msg.textContent = '新密码至少4位'; msg.style.display = 'block'; return; }
            fetch('/api/users/password', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: user.id, oldPassword: oldPwd, newPassword: newPwd })
            }).then(r => r.json()).then(resp => {
                if (resp.code === 200) {
                    alert('✅ 密码修改成功，请重新登录');
                    logout();
                } else {
                    msg.textContent = resp.message || '修改失败';
                    msg.style.display = 'block';
                }
            }).catch(() => { msg.textContent = '网络错误'; msg.style.display = 'block'; });
        }

        function getCurrentUser() {
            const u = localStorage.getItem('waimai_user');
            return u ? JSON.parse(u) : null;
        }

        function renderUser() {
            const user = getCurrentUser();
            const el = document.getElementById('userInfo');
            const adminLink = document.getElementById('adminLink');
            const deliveryLink = document.getElementById('deliveryLink');
            if (user) {
                el.innerHTML = `<span>👋 ${user.nickname || user.username}</span>
                    <div class="dropdown">
                        <button class="dropbtn">👤 个人 ▾</button>
                        <div class="dropdown-content">
                            <a href="#" onclick="showPwdModal();return false;">🔑 修改密码</a>
                            <a href="#" onclick="logout();return false;">🚪 退出</a>
                        </div>
                    </div>`;
                if (adminLink) adminLink.style.display = user.role === 'ADMIN' ? 'inline-block' : 'none';
                if (deliveryLink) deliveryLink.style.display = user.role === 'DELIVERY' ? 'inline-block' : 'none';
            } else {
                el.innerHTML = `<a href="/login.html">登录</a><a href="/register.html">注册</a>`;
                if (adminLink) adminLink.style.display = 'none';
                if (deliveryLink) deliveryLink.style.display = 'none';
            }
        }

        function logout() {
            localStorage.removeItem('waimai_user');
            renderUser();
            location.href = '/';
        }

        function loadRestaurants(keyword) {
            const url = keyword ? `/api/restaurants/search?name=${encodeURIComponent(keyword)}` : '/api/restaurants';
            fetch(url).then(r => r.json()).then(resp => {
                const list = document.getElementById('restaurantList');
                if (resp.code !== 200 || !resp.data || resp.data.length === 0) {
                    list.innerHTML = '<div class="empty"><div class="icon">🍽️</div><p style="animation:fadeIn 0.5s">暂无餐厅</p></div>';
                    return;
                }
                const colors = ['', 'green', 'blue', 'purple'];
                list.innerHTML = resp.data.map((r, i) => `
                    <div class="restaurant-card card-enter" onclick="location.href='/restaurant.html?id=${r.id}'">
                        <div class="banner ${colors[i % 4]}"><span class="icon-float">${r.name.charAt(0)}</span></div>
                        <div class="info">
                            <h3>${r.name}</h3>
                            <div class="desc">${r.description || '暂无介绍'}</div>
                            <div class="meta">
                                <span class="rating">⭐ ${r.rating || '5.0'}</span>
                                <span>配送费 ¥${r.deliveryFee || '0'}</span>
                                <span>📞 ${r.phone || '-'}</span>
                            </div>
                        </div>
                    </div>
                `).join('');
            }).catch(() => {
                document.getElementById('restaurantList').innerHTML = '<div class="empty"><div class="icon">⚠️</div><p>加载失败，请确认后端已启动</p></div>';
            });
        }

        function searchRestaurants() {
            const kw = document.getElementById('searchInput').value.trim();
            loadRestaurants(kw || null);
        }

        renderUser();
        loadRestaurants();
    </script>
</body>
</html>
