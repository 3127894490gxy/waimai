<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 外卖配送系统</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .register-box { background: #fff; border-radius: 16px; padding: 40px; width: 420px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
        .register-box h2 { text-align: center; font-size: 24px; color: #333; margin-bottom: 8px; }
        .register-box .subtitle { text-align: center; color: #999; font-size: 14px; margin-bottom: 32px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 14px; color: #666; margin-bottom: 6px; }
        .form-group input { width: 100%; padding: 12px 16px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 15px; outline: none; transition: border 0.2s; }
        .form-group input:focus { border-color: #ff6b35; }
        .form-group select { width: 100%; padding: 12px 16px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 15px; outline: none; transition: border 0.2s; background: #fff; cursor: pointer; }
        .form-group select:focus { border-color: #ff6b35; }
        .role-cards { display: flex; gap: 10px; margin-bottom: 20px; }
        .role-card { flex: 1; border: 2px solid #e0e0e0; border-radius: 12px; padding: 14px 8px; text-align: center; cursor: pointer; transition: all 0.2s; background: #fff; }
        .role-card:hover { border-color: #ff9a56; }
        .role-card.selected { border-color: #ff6b35; background: #fff6f0; }
        .role-card .icon { font-size: 28px; display: block; margin-bottom: 4px; }
        .role-card .label { font-size: 13px; color: #666; }
        .role-card.selected .label { color: #ff6b35; font-weight: bold; }
        .btn { width: 100%; padding: 12px; background: #ff6b35; color: #fff; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; transition: background 0.2s; }
        .btn:hover { background: #e55a2b; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .error { color: #e74c3c; font-size: 13px; margin-bottom: 12px; display: none; }
        .success { color: #27ae60; font-size: 13px; margin-bottom: 12px; display: none; }
        .footer { text-align: center; margin-top: 20px; font-size: 14px; color: #999; }
        .footer a { color: #ff6b35; text-decoration: none; }
        .back { position: absolute; top: 20px; left: 20px; color: #666; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <a href="/" class="back">← 返回首页</a>
    <div class="register-box">
        <h2>📝 注册</h2>
        <div class="subtitle">选择身份，创建账号</div>
        <div class="error" id="errorMsg"></div>
        <div class="success" id="successMsg"></div>
        <!-- 身份选择 -->
        <div class="role-cards">
            <div class="role-card selected" data-role="CUSTOMER" onclick="selectRole(this)">
                <span class="icon">👤</span>
                <span class="label">普通用户</span>
            </div>
            <div class="role-card" data-role="MERCHANT" onclick="selectRole(this)">
                <span class="icon">🏪</span>
                <span class="label">商家</span>
            </div>
            <div class="role-card" data-role="DELIVERY" onclick="selectRole(this)">
                <span class="icon">🚚</span>
                <span class="label">配送员</span>
            </div>
        </div>
        <div class="form-group">
            <label>用户名</label>
            <input type="text" id="username" placeholder="请设置用户名" oninput="syncNickname()">
        </div>
        <div class="form-group" id="nicknameGroup">
            <label id="nicknameLabel">昵称</label>
            <input type="text" id="nickname" placeholder="请输入昵称" oninput="nicknameEdited()">
        </div>
        <div class="form-group">
            <label>手机号</label>
            <input type="text" id="phone" placeholder="请输入手机号">
        </div>
        <div class="form-group">
            <label>密码</label>
            <input type="password" id="password" placeholder="请设置密码（至少4位）">
        </div>
        <button class="btn" id="registerBtn" onclick="register()">注 册</button>
        <div class="footer">已有账号？<a href="/login.html">立即登录</a></div>
    </div>
    <script>
        let selectedRole = 'CUSTOMER';
        let nicknameSynced = true;

        function syncNickname() {
            if (!nicknameSynced) return;
            const username = document.getElementById('username').value.trim();
            document.getElementById('nickname').value = username;
        }

        function nicknameEdited() {
            nicknameSynced = false;
        }

        function selectRole(el) {
            document.querySelectorAll('.role-card').forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
            selectedRole = el.dataset.role;
            // 切换角色后重新同步昵称
            nicknameSynced = true;
            syncNickname();
            // 根据角色调整昵称字段
            const label = document.getElementById('nicknameLabel');
            const input = document.getElementById('nickname');
            const group = document.getElementById('nicknameGroup');
            if (selectedRole === 'MERCHANT') {
                label.textContent = '商家名称';
                input.placeholder = '请输入店铺名称';
            } else if (selectedRole === 'DELIVERY') {
                label.textContent = '姓名';
                input.placeholder = '请输入配送员姓名';
            } else {
                label.textContent = '昵称';
                input.placeholder = '请输入昵称';
            }
        }

        function register() {
            const username = document.getElementById('username').value.trim();
            const nickname = document.getElementById('nickname').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value.trim();
            const errEl = document.getElementById('errorMsg');
            const sucEl = document.getElementById('successMsg');
            const btn = document.getElementById('registerBtn');
            if (!username || !password) { errEl.textContent = '用户名和密码为必填项'; errEl.style.display = 'block'; sucEl.style.display = 'none'; return; }
            errEl.style.display = 'none'; sucEl.style.display = 'none';
            btn.disabled = true; btn.textContent = '注册中...';
            fetch('/api/users/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, nickname: nickname || username, phone, password, role: selectedRole })
            }).then(r => r.json()).then(resp => {
                if (resp.code === 200 && resp.data) {
                    const roleNames = { CUSTOMER: '普通用户', MERCHANT: '商家', DELIVERY: '配送员' };
                    sucEl.textContent = '🎉 ' + (roleNames[selectedRole] || '用户') + '注册成功！正在跳转到登录...';
                    sucEl.style.display = 'block';
                    setTimeout(() => location.href = '/login.html', 1500);
                } else {
                    errEl.textContent = resp.message || '注册失败，用户名可能已存在';
                    errEl.style.display = 'block';
                    btn.disabled = false; btn.textContent = '注 册';
                }
            }).catch(() => {
                errEl.textContent = '网络错误，请确认后端已启动';
                errEl.style.display = 'block';
                btn.disabled = false; btn.textContent = '注 册';
            });
        }
    </script>
</body>
</html>
