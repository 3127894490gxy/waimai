<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>购物车 - 外卖配送系统</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: #f5f5f5; }
        .navbar { background: linear-gradient(135deg, #ff6b35, #f7931e); color: #fff; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 60px; position: sticky; top: 0; z-index: 100; }
        .navbar a { color: #fff; text-decoration: none; }
        .navbar .logo { font-size: 20px; font-weight: bold; }
        .container { max-width: 800px; margin: 0 auto; padding: 24px; }
        .page-title { font-size: 22px; font-weight: bold; color: #333; margin-bottom: 20px; }
        .cart-item { background: #fff; border-radius: 10px; padding: 16px; margin-bottom: 10px; box-shadow: 0 1px 6px rgba(0,0,0,0.04); display: flex; align-items: center; gap: 16px; }
        .cart-item .info { flex: 1; }
        .cart-item .info h4 { font-size: 16px; color: #333; }
        .cart-item .info .price { color: #ff6b35; font-weight: bold; font-size: 16px; margin-top: 4px; }
        .cart-item .qty-ctrl { display: flex; align-items: center; gap: 8px; }
        .cart-item .qty-ctrl button { width: 30px; height: 30px; border-radius: 50%; border: 1px solid #ddd; background: #fff; font-size: 16px; cursor: pointer; }
        .cart-item .qty-ctrl button:hover { border-color: #ff6b35; color: #ff6b35; }
        .cart-item .qty-ctrl .qty { min-width: 20px; text-align: center; font-weight: bold; }
        .cart-item .del { color: #ccc; cursor: pointer; font-size: 20px; }
        .cart-item .del:hover { color: #e74c3c; }
        .cart-summary { background: #fff; border-radius: 12px; padding: 20px; margin-top: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
        .cart-summary .row { display: flex; justify-content: space-between; padding: 8px 0; font-size: 15px; color: #666; }
        .cart-summary .row.total { font-size: 20px; font-weight: bold; color: #333; border-top: 1px solid #eee; padding-top: 12px; margin-top: 8px; }
        .cart-summary .row.total .price { color: #ff6b35; }
        .checkout-btn { width: 100%; padding: 14px; background: #ff6b35; color: #fff; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; margin-top: 16px; transition: background 0.2s; }
        .checkout-btn:hover { background: #e55a2b; }
        .checkout-btn:disabled { background: #ccc; cursor: not-allowed; }
        .empty { text-align: center; padding: 80px 20px; color: #999; }
        .empty .icon { font-size: 64px; margin-bottom: 16px; }
        .empty a { display: inline-block; margin-top: 16px; padding: 10px 24px; background: #ff6b35; color: #fff; text-decoration: none; border-radius: 6px; }
    </style>
</head>
<body>
    <div class="food-bg">
        <span>🍜</span><span>🥟</span><span>🍕</span><span>🌮</span>
        <span>🍣</span><span>🥘</span><span>🍦</span><span>🧋</span>
    </div>
    <nav class="navbar">
        <a href="/" class="logo">← 返回首页</a>
        <a href="/orders.html">📋 我的订单</a>
    </nav>
    <div class="container">
        <div class="page-title">🛒 购物车</div>
        <div id="cartContent">
            <div class="empty"><div class="icon">🛒</div><p>购物车是空的</p><a href="/">去看看有什么好吃的</a></div>
        </div>
    </div>
    <script>
        function getCurrentUser() {
            const u = localStorage.getItem('waimai_user');
            return u ? JSON.parse(u) : null;
        }

        function loadCart() {
            const user = getCurrentUser();
            const el = document.getElementById('cartContent');
            if (!user) { el.innerHTML = '<div class="empty"><div class="icon">🔐</div><p>请先登录</p><a href="/login.html">去登录</a></div>'; return; }

            let cart = JSON.parse(localStorage.getItem('waimai_cart') || '[]');
            if (cart.length === 0) {
                el.innerHTML = '<div class="empty"><div class="icon">🛒</div><p>购物车是空的</p><a href="/">去看看有什么好吃的</a></div>';
                return;
            }

            let html = '';
            let subtotal = 0;
            cart.forEach((item, idx) => {
                const total = item.price * item.quantity;
                subtotal += total;
                html += `
                    <div class="cart-item">
                        <div class="info">
                            <h4>${item.dishName}</h4>
                            <div class="price">¥${item.price.toFixed(2)}</div>
                        </div>
                        <div class="qty-ctrl">
                            <button onclick="changeQty(${idx}, -1)">−</button>
                            <span class="qty">${item.quantity}</span>
                            <button onclick="changeQty(${idx}, 1)">+</button>
                        </div>
                        <span class="del" onclick="removeItem(${idx})">✕</span>
                    </div>
                `;
            });

            el.innerHTML = html + `
                <div class="cart-summary">
                    <div class="row"><span>商品小计</span><span>¥${subtotal.toFixed(2)}</span></div>
                    <div class="row"><span>配送费</span><span>¥0.00 <small style="color:#aaa;">(到店计算)</small></span></div>
                    <div class="row total"><span>预估合计</span><span class="price">¥${subtotal.toFixed(2)}</span></div>
                    <button class="checkout-btn" onclick="goCheckout()">去结算</button>
                </div>
            `;
        }

        function changeQty(idx, delta) {
            let cart = JSON.parse(localStorage.getItem('waimai_cart') || '[]');
            if (idx >= cart.length) return;
            cart[idx].quantity += delta;
            if (cart[idx].quantity <= 0) cart.splice(idx, 1);
            localStorage.setItem('waimai_cart', JSON.stringify(cart));
            loadCart();
        }

        function removeItem(idx) {
            let cart = JSON.parse(localStorage.getItem('waimai_cart') || '[]');
            cart.splice(idx, 1);
            localStorage.setItem('waimai_cart', JSON.stringify(cart));
            loadCart();
        }

        function goCheckout() {
            const user = getCurrentUser();
            if (!user) { alert('请先登录'); location.href = '/login.html'; return; }
            location.href = '/checkout.html';
        }

        loadCart();
    </script>
</body>
</html>
