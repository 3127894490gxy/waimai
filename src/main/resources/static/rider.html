<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>楠戞墜宸ヤ綔鍙?- 澶栧崠閰嶉€佺郴缁?/title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: #f5f5f5; }
        /* 瀵艰埅鏍?*/
        .navbar { background: linear-gradient(135deg, #4a90d9, #7bb3f0); color: #fff; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 60px; position: sticky; top: 0; z-index: 100; }
        .navbar a { color: #fff; text-decoration: none; }
        .navbar .logo { font-size: 20px; font-weight: bold; }
        .navbar .user-info { font-size: 13px; opacity: 0.9; }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        /* Tab 鍒囨崲 */
        .tabs { display: flex; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.06); margin-bottom: 20px; }
        .tabs .tab { flex: 1; padding: 14px; text-align: center; font-size: 15px; font-weight: bold; color: #999; cursor: pointer; transition: all 0.3s; border-bottom: 3px solid transparent; }
        .tabs .tab:hover { color: #4a90d9; background: #f5f8ff; }
        .tabs .tab.active { color: #4a90d9; border-bottom-color: #4a90d9; background: #f5f8ff; }
        .tabs .tab .count { display: inline-block; background: #4a90d9; color: #fff; font-size: 11px; padding: 1px 8px; border-radius: 10px; margin-left: 4px; vertical-align: middle; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        /* 璁㈠崟鍗＄墖 */
        .order-card { background: #fff; border-radius: 12px; margin-bottom: 14px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); overflow: hidden; animation: fadeInUp 0.4s ease both; }
        .order-card:nth-child(1) { animation-delay: 0.05s; }
        .order-card:nth-child(2) { animation-delay: 0.10s; }
        .order-card:nth-child(3) { animation-delay: 0.15s; }
        .order-card:nth-child(4) { animation-delay: 0.20s; }
        .order-card .header { padding: 16px 20px 8px; display: flex; justify-content: space-between; align-items: center; }
        .order-card .header .order-no { font-size: 13px; color: #999; }
        .order-card .header .status { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .order-card .header .status.pending { background: #fff3e0; color: #ff8c00; }
        .order-card .header .status.delivering { background: #e3f2fd; color: #1976d2; }
        .order-card .header .status.completed { background: #e8f5e9; color: #2e7d32; }
        .order-card .body { padding: 8px 20px 16px; }
        .order-card .body .info-row { display: flex; justify-content: space-between; font-size: 14px; color: #555; padding: 4px 0; }
        .order-card .body .info-row .label { color: #999; }
        .order-card .body .info-row .value { font-weight: bold; color: #333; }
        .order-card .body .address { font-size: 14px; color: #333; padding: 6px 0; }
        .order-card .body .address .icon { margin-right: 6px; }
        .order-card .body .amount { font-size: 18px; font-weight: bold; color: #4a90d9; margin-top: 8px; padding-top: 8px; border-top: 1px solid #f0f0f0; text-align: right; }
        .order-card .footer { background: #fafafa; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; }
        .order-card .footer .time { font-size: 13px; color: #999; }
        /* 鎸夐挳 */
        .btn { padding: 8px 20px; border: none; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; transition: all 0.3s; }
        .btn-accept { background: #4caf50; color: #fff; }
        .btn-accept:hover { background: #43a047; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(76,175,80,0.3); }
        .btn-accept:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
        .btn-deliver { background: #1976d2; color: #fff; }
        .btn-deliver:hover { background: #1565c0; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(25,118,210,0.3); }
        .btn-deliver:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
        .btn-outline { background: #fff; color: #4a90d9; border: 2px solid #4a90d9; }
        .btn-outline:hover { background: #f5f8ff; }
        .btn-logout { background: transparent; color: #fff; border: 1px solid rgba(255,255,255,0.4); padding: 6px 16px; border-radius: 6px; font-size: 13px; cursor: pointer; }
        .btn-logout:hover { background: rgba(255,255,255,0.1); }
        /* 绌虹姸鎬?*/
        .empty { text-align: center; padding: 60px 20px; color: #999; }
        .empty .icon { font-size: 56px; margin-bottom: 12px; }
        .empty p { font-size: 15px; }
        /* Toast */
        .toast { display: none; position: fixed; top: 80px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 12px 24px; border-radius: 8px; font-size: 14px; z-index: 999; animation: slideDown 0.3s ease; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
        .toast.success { background: #4caf50; }
        .toast.error { background: #e74c3c; }
        .toast.info { background: #1976d2; }
        /* 椁愬巺鍚嶇О楂樹寒 */
        .rest-name { color: #4a90d9; font-weight: bold; }
        /* 鑱旂郴鏂瑰紡 */
        .contact-info { display: flex; gap: 16px; font-size: 13px; color: #666; padding: 4px 0; }
        .contact-info span { display: flex; align-items: center; gap: 4px; }
        /* 鍝嶅簲寮?*/
        @media (max-width: 600px) {
            .container { padding: 12px; }
            .tabs .tab { font-size: 13px; padding: 12px 8px; }
            .order-card .footer { flex-direction: column; gap: 8px; align-items: stretch; }
            .order-card .footer .btn { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="food-bg">
        <span>馃弽锔?/span><span>馃殮</span><span>馃摝</span><span>馃椇锔?/span>
        <span>馃搷</span><span>鈿?/span><span>馃幆</span><span>鉁?/span>
    </div>

    <!-- 瀵艰埅鏍?-->
    <nav class="navbar">
        <a href="/" class="logo">馃弽锔?楠戞墜宸ヤ綔鍙?/a>
        <div style="display:flex;align-items:center;gap:12px;">
            <span class="user-info" id="riderInfo"></span>
            <button class="btn-logout" onclick="logout()">閫€鍑虹櫥褰?/button>
        </div>
    </nav>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <div class="container">
        <!-- Tab 鍒囨崲 -->
        <div class="tabs">
            <div class="tab active" onclick="switchTab('available')" id="tab-available">
                馃搵 鍙帴鍗?<span class="count" id="availableCount">0</span>
            </div>
            <div class="tab" onclick="switchTab('delivering')" id="tab-delivering">
                馃殮 閰嶉€佷腑 <span class="count" id="deliveringCount">0</span>
            </div>
            <div class="tab" onclick="switchTab('history')" id="tab-history">
                鉁?閰嶉€佸巻鍙?
            </div>
        </div>

        <!-- Tab 1: 鍙帴鍗?-->
        <div class="tab-content active" id="content-available">
            <div id="availableList"><div class="loading" style="text-align:center;padding:40px;color:#999;">鍔犺浇涓?..</div></div>
        </div>

        <!-- Tab 2: 閰嶉€佷腑 -->
        <div class="tab-content" id="content-delivering">
            <div id="deliveringList"><div class="loading" style="text-align:center;padding:40px;color:#999;">鍔犺浇涓?..</div></div>
        </div>

        <!-- Tab 3: 閰嶉€佸巻鍙?-->
        <div class="tab-content" id="content-history">
            <div id="historyList"><div class="loading" style="text-align:center;padding:40px;color:#999;">鍔犺浇涓?..</div></div>
        </div>
    </div>

    <script>
        // ===== 宸ュ叿鍑芥暟 =====
        function getCurrentUser() {
            const u = localStorage.getItem('waimai_user');
            return u ? JSON.parse(u) : null;
        }

        function checkRider() {
            const user = getCurrentUser();
            if (!user || user.role !== 'DELIVERY') {
                alert('璇风敤楠戞墜璐﹀彿鐧诲綍锛乗n榛樿楠戞墜璐﹀彿: delivery1 / 123456');
                location.href = '/login.html?redirect=/rider.html';
                return null;
            }
            document.getElementById('riderInfo').textContent = '馃憢 ' + (user.nickname || user.username);
            return user;
        }

        function toast(msg, type) {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.className = 'toast ' + (type || 'info');
            el.style.display = 'block';
            setTimeout(function () { el.style.display = 'none'; }, 2500);
        }

        function logout() {
            localStorage.removeItem('waimai_user');
            location.href = '/login.html';
        }

        // ===== Tab 鍒囨崲 =====
        var currentTab = 'available';

        function switchTab(name) {
            currentTab = name;
            document.querySelectorAll('.tab').forEach(function (el) { el.classList.remove('active'); });
            document.querySelectorAll('.tab-content').forEach(function (el) { el.classList.remove('active'); });
            document.getElementById('tab-' + name).classList.add('active');
            document.getElementById('content-' + name).classList.add('active');
            if (name === 'available') loadAvailableOrders();
            if (name === 'delivering') loadDeliveringOrders();
            if (name === 'history') loadHistoryOrders();
        }

        // ===== 鐘舵€佹槧灏?=====
        var statusMap = {
            'PAID': { text: '宸叉敮浠?, cls: 'pending' },
            'ACCEPTED': { text: '寰呮帴鍗?, cls: 'pending' },
            'PREPARING': { text: '鍙栭涓?, cls: 'pending' },
            'DELIVERING': { text: '閰嶉€佷腑', cls: 'delivering' },
            'DELIVERED': { text: '宸查€佽揪', cls: 'completed' },
            'COMPLETED': { text: '宸插畬鎴?, cls: 'completed' }
        };

        // ===== 鍔犺浇椁愬巺鍚嶇О =====
        var restNameCache = {};

        function getRestaurantName(restaurantId) {
            if (restNameCache[restaurantId]) return Promise.resolve(restNameCache[restaurantId]);
            return fetch('/api/restaurants/' + restaurantId).then(function (r) { return r.json(); }).then(function (resp) {
                var name = resp.data ? resp.data.name : '椁愬巺#' + restaurantId;
                restNameCache[restaurantId] = name;
                return name;
            }).catch(function () { return '椁愬巺#' + restaurantId; });
        }

        // ===== 鍔犺浇鍙帴鍗曞垪琛?=====
        function loadAvailableOrders() {
            var el = document.getElementById('availableList');
            el.innerHTML = '<div class="loading" style="text-align:center;padding:40px;color:#999;"><div class="loading-spinner" style="margin:0 auto 12px;"></div><br>鍔犺浇涓?..</div>';
            fetch('/api/orders/delivery/pending').then(function (r) { return r.json(); }).then(function (resp) {
                if (resp.code !== 200 || !resp.data || resp.data.length === 0) {
                    el.innerHTML = '<div class="empty"><div class="icon">馃搵</div><p>鏆傛棤寰呴厤閫佽鍗?/p></div>';
                    document.getElementById('availableCount').textContent = '0';
                    return;
                }
                document.getElementById('availableCount').textContent = resp.data.length;
                var promises = resp.data.map(function (order) {
                    return getRestaurantName(order.restaurantId).then(function (restName) {
                        var st = statusMap[order.status] || { text: order.status, cls: '' };
                        return { order: order, restName: restName, st: st };
                    });
                });
                Promise.all(promises).then(function (results) {
                    el.innerHTML = results.map(function (r) {
                        var o = r.order;
                        return '<div class="order-card">' +
                            '<div class="header">' +
                            '<span class="order-no">馃啍 ' + o.orderNo + '</span>' +
                            '<span class="status ' + r.st.cls + '">' + r.st.text + '</span>' +
                            '</div>' +
                            '<div class="body">' +
                            '<div class="info-row"><span class="label">馃彧 椁愬巺</span><span class="value rest-name">' + r.restName + '</span></div>' +
                            '<div class="address"><span class="icon">馃搷</span>' + (o.deliveryAddress || '鏈～鍐欏湴鍧€') + '</div>' +
                            '<div class="contact-info">' +
                            (o.contactName ? '<span>馃懁 ' + o.contactName + '</span>' : '') +
                            (o.contactPhone ? '<span>馃摓 ' + o.contactPhone + '</span>' : '') +
                            '</div>' +
                            '<div class="amount">楼' + (o.totalAmount ? o.totalAmount.toFixed(2) : '0.00') + '</div>' +
                            '</div>' +
                            '<div class="footer">' +
                            '<span class="time">鈴?' + (o.createTime ? new Date(o.createTime).toLocaleString('zh-CN') : '') + '</span>' +
                            '<button class="btn btn-accept" onclick="acceptOrder(' + o.id + ', this)">馃弽锔?鎺ュ崟</button>' +
                            '</div>' +
                            '</div>';
                    }).join('');
                });
            }).catch(function () {
                el.innerHTML = '<div class="empty"><div class="icon">鈿狅笍</div><p>鍔犺浇澶辫触锛岃纭鍚庣宸插惎鍔?/p></div>';
            });
        }

        // ===== 鎺ュ崟 =====
        function acceptOrder(orderId, btn) {
            var user = getCurrentUser();
            if (!user) { toast('璇峰厛鐧诲綍', 'error'); return; }
            btn.disabled = true;
            btn.textContent = '鎺ュ崟涓?..';
            fetch('/api/orders/' + orderId + '/assign-delivery', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    deliveryId: user.id,
                    deliveryName: user.nickname || user.username
                })
            }).then(function (r) { return r.json(); }).then(function (resp) {
                if (resp.code === 200) {
                    toast('鉁?鎺ュ崟鎴愬姛锛佸墠寰€閰嶉€佷腑鏌ョ湅', 'success');
                    loadAvailableOrders();
                    loadDeliveringOrders();
                } else {
                    toast(resp.message || '鎺ュ崟澶辫触', 'error');
                    btn.disabled = false;
                    btn.textContent = '馃弽锔?鎺ュ崟';
                }
            }).catch(function () {
                toast('缃戠粶閿欒', 'error');
                btn.disabled = false;
                btn.textContent = '馃弽锔?鎺ュ崟';
            });
        }

        // ===== 鍔犺浇閰嶉€佷腑璁㈠崟 =====
        function loadDeliveringOrders() {
            var user = getCurrentUser();
            var el = document.getElementById('deliveringList');
            if (!user) { el.innerHTML = '<div class="empty"><div class="icon">馃攼</div><p>璇峰厛鐧诲綍</p></div>'; return; }
            el.innerHTML = '<div class="loading" style="text-align:center;padding:40px;color:#999;"><div class="loading-spinner" style="margin:0 auto 12px;"></div><br>鍔犺浇涓?..</div>';
            fetch('/api/orders/delivery/' + user.id).then(function (r) { return r.json(); }).then(function (resp) {
                if (resp.code !== 200 || !resp.data || resp.data.length === 0) {
                    el.innerHTML = '<div class="empty"><div class="icon">馃殮</div><p>鏆傛棤閰嶉€佷腑鐨勮鍗?/p></div>';
                    document.getElementById('deliveringCount').textContent = '0';
                    return;
                }
                // 绛涢€夊嚭閰嶉€佷腑鍜屽凡閫佽揪浣嗘湭瀹屾垚鐨?
                var delivering = resp.data.filter(function (o) {
                    return o.status === 'DELIVERING' || o.status === 'PAID' || o.status === 'ACCEPTED' || o.status === 'PREPARING';
                });
                document.getElementById('deliveringCount').textContent = delivering.length;
                if (delivering.length === 0) {
                    el.innerHTML = '<div class="empty"><div class="icon">馃殮</div><p>鏆傛棤閰嶉€佷腑鐨勮鍗?/p></div>';
                    return;
                }
                var promises = delivering.map(function (order) {
                    return getRestaurantName(order.restaurantId).then(function (restName) {
                        var st = statusMap[order.status] || { text: order.status, cls: '' };
                        return { order: order, restName: restName, st: st };
                    });
                });
                Promise.all(promises).then(function (results) {
                    el.innerHTML = results.map(function (r) {
                        var o = r.order;
                        return '<div class="order-card">' +
                            '<div class="header">' +
                            '<span class="order-no">馃啍 ' + o.orderNo + '</span>' +
                            '<span class="status ' + r.st.cls + '">' + r.st.text + '</span>' +
                            '</div>' +
                            '<div class="body">' +
                            '<div class="info-row"><span class="label">馃彧 椁愬巺</span><span class="value rest-name">' + r.restName + '</span></div>' +
                            '<div class="address"><span class="icon">馃搷</span>' + (o.deliveryAddress || '鏈～鍐欏湴鍧€') + '</div>' +
                            '<div class="contact-info">' +
                            (o.contactName ? '<span>馃懁 ' + o.contactName + '</span>' : '') +
                            (o.contactPhone ? '<span>馃摓 ' + o.contactPhone + '</span>' : '') +
                            '</div>' +
                            '<div class="amount">楼' + (o.totalAmount ? o.totalAmount.toFixed(2) : '0.00') + '</div>' +
                            '</div>' +
                            '<div class="footer">' +
                            '<span class="time">鈴?' + (o.createTime ? new Date(o.createTime).toLocaleString('zh-CN') : '') + '</span>' +
                            (o.status === 'DELIVERING' ?
                                '<button class="btn btn-deliver" onclick="confirmDelivered(' + o.id + ', this)">鉁?纭閫佽揪</button>' :
                                '<span style="color:#ff8c00;font-size:13px;font-weight:bold;">鈴?绛夊緟鍟嗗鍑洪</span>'
                            ) +
                            '</div>' +
                            '</div>';
                    }).join('');
                });
            }).catch(function () {
                el.innerHTML = '<div class="empty"><div class="icon">鈿狅笍</div><p>鍔犺浇澶辫触</p></div>';
            });
        }

        // ===== 纭閫佽揪 =====
        function confirmDelivered(orderId, btn) {
            if (!confirm('纭璇ヨ鍗曞凡閫佽揪锛?)) return;
            btn.disabled = true;
            btn.textContent = '纭涓?..';
            fetch('/api/orders/' + orderId + '/status', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: 'DELIVERED' })
            }).then(function (r) { return r.json(); }).then(function (resp) {
                if (resp.code === 200) {
                    toast('鉁?宸茬‘璁ら€佽揪锛?, 'success');
                    loadDeliveringOrders();
                    loadHistoryOrders();
                } else {
                    toast(resp.message || '鎿嶄綔澶辫触', 'error');
                    btn.disabled = false;
                    btn.textContent = '鉁?纭閫佽揪';
                }
            }).catch(function () {
                toast('缃戠粶閿欒', 'error');
                btn.disabled = false;
                btn.textContent = '鉁?纭閫佽揪';
            });
        }

        // ===== 鍔犺浇閰嶉€佸巻鍙?=====
        function loadHistoryOrders() {
            var user = getCurrentUser();
            var el = document.getElementById('historyList');
            if (!user) { el.innerHTML = '<div class="empty"><div class="icon">馃攼</div><p>璇峰厛鐧诲綍</p></div>'; return; }
            el.innerHTML = '<div class="loading" style="text-align:center;padding:40px;color:#999;"><div class="loading-spinner" style="margin:0 auto 12px;"></div><br>鍔犺浇涓?..</div>';
            fetch('/api/orders/delivery/' + user.id).then(function (r) { return r.json(); }).then(function (resp) {
                if (resp.code !== 200 || !resp.data || resp.data.length === 0) {
                    el.innerHTML = '<div class="empty"><div class="icon">馃摝</div><p>鏆傛棤閰嶉€佽褰?/p></div>';
                    return;
                }
                var history = resp.data.filter(function (o) {
                    return o.status === 'DELIVERED' || o.status === 'COMPLETED' || o.status === 'CANCELLED';
                });
                if (history.length === 0) {
                    el.innerHTML = '<div class="empty"><div class="icon">馃摝</div><p>鏆傛棤閰嶉€佽褰?/p></div>';
                    return;
                }
                var promises = history.map(function (order) {
                    return getRestaurantName(order.restaurantId).then(function (restName) {
                        var st = statusMap[order.status] || { text: order.status, cls: '' };
                        var cls = order.status === 'CANCELLED' ? 'cancelled' : st.cls;
                        return { order: order, restName: restName, text: st.text, cls: cls };
                    });
                });
                Promise.all(promises).then(function (results) {
                    el.innerHTML = results.map(function (r) {
                        var o = r.order;
                        return '<div class="order-card">' +
                            '<div class="header">' +
                            '<span class="order-no">馃啍 ' + o.orderNo + '</span>' +
                            '<span class="status ' + r.cls + '">' + r.text + '</span>' +
                            '</div>' +
                            '<div class="body">' +
                            '<div class="info-row"><span class="label">馃彧 椁愬巺</span><span class="value rest-name">' + r.restName + '</span></div>' +
                            '<div class="address"><span class="icon">馃搷</span>' + (o.deliveryAddress || '鏈～鍐欏湴鍧€') + '</div>' +
                            '<div class="amount">楼' + (o.totalAmount ? o.totalAmount.toFixed(2) : '0.00') + '</div>' +
                            '</div>' +
                            '<div class="footer">' +
                            '<span class="time">鈴?' + (o.createTime ? new Date(o.createTime).toLocaleString('zh-CN') : '') + '</span>' +
                            '</div>' +
                            '</div>';
                    }).join('');
                });
            }).catch(function () {
                el.innerHTML = '<div class="empty"><div class="icon">鈿狅笍</div><p>鍔犺浇澶辫触</p></div>';
            });
        }

        // ===== 鍒濆鍖?=====
        var rider = checkRider();
        if (rider) {
            loadAvailableOrders();
            loadDeliveringOrders();
            loadHistoryOrders();
        }
    </script>
</body>
</html>
