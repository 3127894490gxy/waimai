<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 外卖配送系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .register-box { background: #fff; border-radius: 16px; padding: 40px; width: 400px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
        .register-box h2 { text-align: center; font-size: 24px; color: #333; margin-bottom: 8px; }
        .register-box .subtitle { text-align: center; color: #999; font-size: 14px; margin-bottom: 32px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 14px; color: #666; margin-bottom: 6px; }
        .form-group input { width: 100%; padding: 12px 16px; border: 1px solid #e0e0e0; border-radius: 8px; font-size: 15px; outline: none; transition: border 0.2s; }
        .form-group input:focus { border-color: #ff6b35; }
        .btn { width: 100%; padding: 12px; background: #ff6b35; color: #fff; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; transition: background 0.2s; }
        .btn:hover { background: #e55a2b; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .error { color: #e74c3c; font-size: 13px; margin-bottom: 12px; display: none; }
        .success { color: #27ae60; font-size: 13px; margin-bottom: 12px; display: none; }
        .footer { text-align: center; margin-top: 20px; font-size: 14px; color: #999; }
        .footer a { color: #ff6b35; text-decoration: none; }
        .back { position: absolute; top: 20px; left: 20px; color: #666; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>
    <a href="/" class="back">← 返回首页</a>
    <div class="register-box">
        <h2>📝 注册</h2>
        <div class="subtitle">创建账号开始点餐</div>
        <div class="error" id="errorMsg"></div>
        <div class="success" id="successMsg"></div>
        <div class="form-group">
            <label>用户名</label>
            <input type="text" id="username" placeholder="请设置用户名">
        </div>
        <div class="form-group">
            <label>昵称</label>
            <input type="text" id="nickname" placeholder="请输入昵称">
        </div>
        <div class="form-group">
            <label>手机号</label>
            <input type="text" id="phone" placeholder="请输入手机号">
        </div>
        <div class="form-group">
            <label>密码</label>
            <input type="password" id="password" placeholder="请设置密码">
        </div>
        <button class="btn" id="registerBtn" onclick="register()">注 册</button>
        <div class="footer">已有账号？<a href="/login.html">立即登录</a></div>
    </div>
    <script>
        function register() {
            const username = document.getElementById('username').value.trim();
            const nickname = document.getElementById('nickname').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value.trim();
            const errEl = document.getElementById('errorMsg');
            const sucEl = document.getElementById('successMsg');
            const btn = document.getElementById('registerBtn');
            if (!username || !password) { errEl.textContent = '用户名和密码为必填项'; errEl.style.display = 'block'; sucEl.style.display = 'none'; return; }
            errEl.style.display = 'none'; sucEl.style.display = 'none';
            btn.disabled = true; btn.textContent = '注册中...';
            fetch('/api/users/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, nickname: nickname || username, phone, password })
            }).then(r => r.json()).then(resp => {
                if (resp.code === 200 && resp.data) {
                    sucEl.textContent = '🎉 注册成功！正在跳转到登录...';
                    sucEl.style.display = 'block';
                    setTimeout(() => location.href = '/login.html', 1500);
                } else {
                    errEl.textContent = resp.message || '注册失败，用户名可能已存在';
                    errEl.style.display = 'block';
                    btn.disabled = false; btn.textContent = '注 册';
                }
            }).catch(() => {
                errEl.textContent = '网络错误，请确认后端已启动';
                errEl.style.display = 'block';
                btn.disabled = false; btn.textContent = '注 册';
            });
        }
    </script>
</body>
</html>
