<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>缁撶畻 - 澶栧崠閰嶉€佺郴缁?/title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: #f5f5f5; }
        .navbar { background: linear-gradient(135deg, #4a90d9, #7bb3f0); color: #fff; padding: 0 24px; display: flex; align-items: center; height: 60px; }
        .navbar a { color: #fff; text-decoration: none; font-size: 18px; }
        .container { max-width: 800px; margin: 0 auto; padding: 24px; }
        .page-title { font-size: 22px; font-weight: bold; color: #333; margin-bottom: 20px; }
        .section { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
        .section h3 { font-size: 16px; color: #333; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid #f0f0f0; }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 13px; color: #666; margin-bottom: 4px; }
        .form-group input, .form-group textarea { width: 100%; padding: 10px 14px; border: 1px solid #e0e0e0; border-radius: 6px; font-size: 14px; outline: none; }
        .form-group input:focus, .form-group textarea:focus { border-color: #4a90d9; }
        .form-group textarea { resize: vertical; min-height: 60px; }
        .order-item { display: flex; justify-content: space-between; padding: 8px 0; font-size: 14px; border-bottom: 1px solid #f5f5f5; }
        .order-item:last-child { border: none; }
        .order-item .name { color: #333; }
        .order-item .price { color: #888; }
        .total-line { display: flex; justify-content: space-between; font-size: 20px; font-weight: bold; margin-top: 12px; padding-top: 12px; border-top: 2px solid #4a90d9; }
        .total-line .price { color: #4a90d9; }
        .pay-options { display: flex; gap: 12px; margin: 12px 0; }
        .pay-options label { flex: 1; border: 2px solid #e0e0e0; border-radius: 8px; padding: 12px; text-align: center; cursor: pointer; transition: all 0.2s; font-size: 14px; }
        .pay-options label:hover { border-color: #5b9bd5; }
        .pay-options input[type="radio"]:checked + span { color: #4a90d9; }
        .pay-options input { display: none; }
        .pay-options input:checked + span { color: #4a90d9; font-weight: bold; }
        .pay-options label:has(input:checked) { border-color: #4a90d9; background: #f0f7ff; }
        .submit-btn { width: 100%; padding: 14px; background: #4a90d9; color: #fff; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; transition: background 0.2s; }
        .submit-btn:hover { background: #3a7bc8; }
        .submit-btn:disabled { background: #ccc; cursor: not-allowed; }
        .loading { text-align: center; padding: 40px; color: #999; }
    </style>
</head>
<body>
    <div class="food-bg">
        <span>馃崪</span><span>馃</span><span>馃崟</span><span>馃尞</span>
        <span>馃崳</span><span>馃</span><span>馃崷</span><span>馃</span>
    </div>
    <nav class="navbar">
        <a href="/cart.html">鈫?杩斿洖璐墿杞?/a>
        <a href="/rider.html" id="checkoutRiderLink" style="display:none;">馃弽锔?楠戞墜宸ヤ綔鍙?/a>
    </nav>
    <div class="container">
        <div class="page-title">馃搵 纭璁㈠崟</div>
        <div id="checkoutContent"></div>
    </div>
    <script>
        function getCurrentUser() {
            const u = localStorage.getItem('waimai_user');
            return u ? JSON.parse(u) : null;
        }

        function loadCheckout() {
            const user = getCurrentUser();
            if (!user) { location.href = '/login.html?redirect=/checkout.html'; return; }
            // 楠戞墜鎷︽埅
            if (user.role === 'DELIVERY') {
                document.getElementById('checkoutContent').innerHTML = '<div class="section"><div style="text-align:center;padding:40px 20px;"><div style="font-size:56px;margin-bottom:12px;">馃弽锔?/div><p style="font-size:16px;color:#333;font-weight:bold;">楠戞墜鏃犻渶涓嬪崟</p><p style="color:#999;margin-top:8px;">璇峰墠寰€楠戞墜宸ヤ綔鍙扮鐞嗛厤閫佽鍗?/p><a href="/rider.html" style="display:inline-block;margin-top:16px;padding:10px 24px;background:#4a90d9;color:#fff;text-decoration:none;border-radius:6px;">鍓嶅線宸ヤ綔鍙?鈫?/a></div></div>';
                document.getElementById('checkoutRiderLink').style.display = 'inline';
                return;
            }

            const cart = JSON.parse(localStorage.getItem('waimai_cart') || '[]');
            if (cart.length === 0) { document.getElementById('checkoutContent').innerHTML = '<div class="section"><p style="text-align:center;color:#999;">璐墿杞︽槸绌虹殑</p></div>'; return; }

            const restaurantId = cart[0].restaurantId;
            let subtotal = 0;
            let itemsHtml = '';
            cart.forEach(item => {
                const total = item.price * item.quantity;
                subtotal += total;
                itemsHtml += `<div class="order-item"><span class="name">${item.dishName} 脳 ${item.quantity}</span><span class="price">楼${total.toFixed(2)}</span></div>`;
            });

            // 鑾峰彇椁愬巺淇℃伅锛堥厤閫佽垂锛?
            fetch(`/api/restaurants/${restaurantId}`).then(r => r.json()).then(resp => {
                const deliveryFee = (resp.data && resp.data.deliveryFee) ? parseFloat(resp.data.deliveryFee) : 0;
                const total = subtotal + deliveryFee;
                document.getElementById('checkoutContent').innerHTML = `
                    <div class="section">
                        <h3>馃搷 閰嶉€佷俊鎭?/h3>
                        <div class="form-group">
                            <label>鑱旂郴浜?/label>
                            <input type="text" id="contactName" value="${user.nickname || user.username}">
                        </div>
                        <div class="form-group">
                            <label>鑱旂郴鐢佃瘽</label>
                            <input type="text" id="contactPhone" value="${user.phone || ''}">
                        </div>
                        <div class="form-group">
                            <label>閰嶉€佸湴鍧€</label>
                            <textarea id="deliveryAddress">${user.address || ''}</textarea>
                        </div>
                        <div class="form-group">
                            <label>澶囨敞</label>
                            <textarea id="remark" placeholder="濡傦細灏戣荆銆佸鏀鹃唻..."></textarea>
                        </div>
                    </div>
                    <div class="section">
                        <h3>馃崪 璁㈠崟鍟嗗搧</h3>
                        ${itemsHtml}
                        <div class="order-item"><span>閰嶉€佽垂</span><span>楼${deliveryFee.toFixed(2)}</span></div>
                        <div class="total-line"><span>鍚堣</span><span class="price">楼${total.toFixed(2)}</span></div>
                    </div>
                    <div class="section">
                        <h3>馃挸 鏀粯鏂瑰紡</h3>
                        <div class="pay-options">
                            <label><input type="radio" name="payment" value="寰俊鏀粯" checked><span>馃挌 寰俊鏀粯</span></label>
                            <label><input type="radio" name="payment" value="鏀粯瀹?><span>馃挋 鏀粯瀹?/span></label>
                            <label><input type="radio" name="payment" value="璐у埌浠樻"><span>馃挼 璐у埌浠樻</span></label>
                        </div>
                    </div>
                    <button class="submit-btn" onclick="submitOrder(${restaurantId}, ${deliveryFee}, ${total})">鎻愪氦璁㈠崟 路 楼${total.toFixed(2)}</button>
                `;
            });
        }

        function submitOrder(restaurantId, deliveryFee, totalAmount) {
            const user = getCurrentUser();
            const cart = JSON.parse(localStorage.getItem('waimai_cart') || '[]');
            if (cart.length === 0) { alert('璐墿杞︿负绌?); return; }

            const btn = document.querySelector('.submit-btn');
            btn.disabled = true; btn.textContent = '鎻愪氦涓?..';

            const items = cart.map(item => ({
                dishId: item.dishId,
                dishName: item.dishName,
                quantity: item.quantity,
                price: item.price
            }));

            fetch('/api/orders', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    userId: user.id,
                    restaurantId: restaurantId,
                    deliveryFee: deliveryFee,
                    deliveryAddress: document.getElementById('deliveryAddress').value.trim(),
                    contactPhone: document.getElementById('contactPhone').value.trim(),
                    contactName: document.getElementById('contactName').value.trim(),
                    remark: document.getElementById('remark').value.trim(),
                    items: items
                })
            }).then(r => r.json()).then(resp => {
                if (resp.code === 200 && resp.data) {
                    // 鏀粯
                    return fetch('/api/orders/pay', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ orderId: resp.data.id, paymentMethod: '寰俊鏀粯' })
                    }).then(r => r.json());
                } else {
                    throw new Error(resp.message || '涓嬪崟澶辫触');
                }
            }).then(payResp => {
                if (payResp.code === 200) {
                    localStorage.removeItem('waimai_cart');
                    alert('馃帀 鏀粯鎴愬姛锛佽鍗曞凡鎻愪氦');
                    location.href = '/orders.html';
                } else {
                    alert('鏀粯澶辫触锛岃閲嶈瘯');
                    btn.disabled = false; btn.textContent = '閲嶆柊鏀粯';
                }
            }).catch(err => {
                alert('鎿嶄綔澶辫触: ' + err.message);
                btn.disabled = false; btn.textContent = '閲嶈瘯';
            });
        }

        loadCheckout();
    </script>
</body>
</html>
