<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的订单 - 外卖配送系统</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: #f5f5f5; }
        .navbar { background: linear-gradient(135deg, #ff6b35, #f7931e); color: #fff; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 60px; position: sticky; top: 0; z-index: 100; }
        .navbar a { color: #fff; text-decoration: none; }
        .navbar .logo { font-size: 20px; font-weight: bold; }
        .container { max-width: 800px; margin: 0 auto; padding: 24px; }
        .page-title { font-size: 22px; font-weight: bold; color: #333; margin-bottom: 20px; }
        .order-card { background: #fff; border-radius: 12px; margin-bottom: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); overflow: hidden; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
        .order-card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
        .order-card .header { padding: 16px 20px 8px; display: flex; justify-content: space-between; align-items: center; }
        .order-card .header .order-no { font-size: 13px; color: #999; }
        .order-card .header .status { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .order-card .header .status.pending { background: #fff3e0; color: #ff8c00; }
        .order-card .header .status.paid { background: #e8f5e9; color: #43a047; }
        .order-card .header .status.delivering { background: #e3f2fd; color: #1976d2; }
        .order-card .header .status.completed { background: #e8f5e9; color: #2e7d32; }
        .order-card .header .status.cancelled { background: #fce4ec; color: #c62828; }
        .order-card .body { padding: 8px 20px 16px; }
        .order-card .body .item-row { display: flex; justify-content: space-between; font-size: 14px; color: #555; padding: 4px 0; }
        .order-card .body .total { text-align: right; font-size: 18px; font-weight: bold; color: #ff6b35; margin-top: 8px; padding-top: 8px; border-top: 1px solid #f0f0f0; }
        .order-card .footer { background: #fafafa; padding: 10px 20px; display: flex; justify-content: space-between; font-size: 13px; color: #999; }
        .order-card .footer .rest-name { color: #ff6b35; }
        .empty { text-align: center; padding: 80px 20px; color: #999; }
        .empty .icon { font-size: 64px; margin-bottom: 16px; }
        .empty a { display: inline-block; margin-top: 16px; padding: 10px 24px; background: #ff6b35; color: #fff; text-decoration: none; border-radius: 6px; }
        .loading { text-align: center; padding: 40px; color: #999; }
        /* 详情弹窗 */
        .order-detail-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
        .order-detail-overlay.show { display: flex; }
        .order-detail-modal { background: #fff; border-radius: 16px; width: 520px; max-width: 100%; max-height: 85vh; overflow-y: auto; box-shadow: 0 12px 48px rgba(0,0,0,0.2); animation: fadeInUp 0.3s ease; }
        .order-detail-modal .detail-header { padding: 20px 24px 16px; border-bottom: 1px solid #f0f0f0; position: sticky; top: 0; background: #fff; border-radius: 16px 16px 0 0; display: flex; justify-content: space-between; align-items: flex-start; }
        .order-detail-modal .detail-header .order-title { font-size: 16px; font-weight: bold; color: #333; }
        .order-detail-modal .detail-header .order-title small { font-size: 12px; font-weight: normal; color: #999; }
        .order-detail-modal .close-btn { width: 32px; height: 32px; border-radius: 50%; border: none; background: #f5f5f5; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #999; flex-shrink: 0; }
        .order-detail-modal .close-btn:hover { background: #eee; color: #333; }
        .order-detail-modal .detail-body { padding: 16px 24px 24px; }
        .order-detail-modal .detail-section { margin-bottom: 20px; }
        .order-detail-modal .detail-section h4 { font-size: 14px; color: #666; margin-bottom: 10px; padding-bottom: 6px; border-bottom: 1px solid #f5f5f5; }
        .order-detail-modal .detail-section .info-row { display: flex; justify-content: space-between; padding: 5px 0; font-size: 14px; color: #555; }
        .order-detail-modal .detail-section .info-row .label { color: #999; }
        .order-detail-modal .detail-section .info-row .value { font-weight: bold; color: #333; }
        .order-detail-modal .detail-section .info-row .value.price { color: #ff6b35; }
        .order-detail-modal .detail-timeline { display: flex; justify-content: space-between; padding: 16px 0; }
        .order-detail-modal .detail-timeline .step { text-align: center; flex: 1; position: relative; }
        .order-detail-modal .detail-timeline .step .icon { font-size: 24px; display: block; margin-bottom: 4px; }
        .order-detail-modal .detail-timeline .step .label { font-size: 11px; color: #ccc; }
        .order-detail-modal .detail-timeline .step.active .label { color: #ff6b35; font-weight: bold; }
        .order-detail-modal .detail-timeline .step.done .label { color: #27ae60; }
        .order-detail-modal .delivery-stats { background: #f0f8ff; border-radius: 10px; padding: 14px; display: flex; gap: 16px; margin-top: 8px; }
        .order-detail-modal .delivery-stats .stat-item { flex: 1; text-align: center; }
        .order-detail-modal .delivery-stats .stat-item .num { font-size: 22px; font-weight: bold; color: #4a90d9; }
        .order-detail-modal .delivery-stats .stat-item .lbl { font-size: 11px; color: #999; }
    </style>
</head>
<body>
    <div class="food-bg">
        <span>🍜</span><span>🥟</span><span>🍕</span><span>🌮</span>
        <span>🍣</span><span>🥘</span><span>🍦</span><span>🧋</span>
    </div>
    <nav class="navbar">
        <a href="/" class="logo">← 返回首页</a>
        <a href="/cart.html">🛒 购物车</a>
    </nav>
    <div class="container">
        <div class="page-title">📋 我的订单</div>
        <div id="orderList">
            <div class="loading">加载中...</div>
        </div>
    </div>

    <!-- 订单详情弹窗 -->
    <div class="order-detail-overlay" id="detailOverlay" onclick="if(event.target===this)closeDetail()">
        <div class="order-detail-modal" id="detailModal">
            <div class="detail-header">
                <div>
                    <div class="order-title" id="detailTitle">订单详情</div>
                    <small id="detailOrderNo"></small>
                </div>
                <button class="close-btn" onclick="closeDetail()">✕</button>
            </div>
            <div class="detail-body" id="detailBody"></div>
        </div>
    </div>

    <script>
        function getCurrentUser() {
            const u = localStorage.getItem('waimai_user');
            return u ? JSON.parse(u) : null;
        }

        const statusMap = {
            'PENDING_PAYMENT': { text: '待支付', cls: 'pending', step: 0 },
            'PAID': { text: '已支付', cls: 'paid', step: 1 },
            'ACCEPTED': { text: '商家已接单', cls: 'paid', step: 2 },
            'PREPARING': { text: '准备中', cls: 'delivering', step: 2 },
            'DELIVERING': { text: '配送中', cls: 'delivering', step: 3 },
            'DELIVERED': { text: '已送达', cls: 'completed', step: 4 },
            'COMPLETED': { text: '已完成', cls: 'completed', step: 5 },
            'CANCELLED': { text: '已取消', cls: 'cancelled', step: -1 }
        };

        function loadOrders() {
            const user = getCurrentUser();
            const el = document.getElementById('orderList');
            if (!user) { el.innerHTML = '<div class="empty"><div class="icon">🔐</div><p>请先登录查看订单</p><a href="/login.html">去登录</a></div>'; return; }

            fetch(`/api/orders/user/${user.id}`).then(r => r.json()).then(resp => {
                if (resp.code !== 200 || !resp.data || resp.data.length === 0) {
                    el.innerHTML = '<div class="empty"><div class="icon">📋</div><p>暂无订单</p><a href="/">去点餐</a></div>';
                    return;
                }

                // 为每个订单加载餐厅名称和订单项
                const promises = resp.data.map(order => {
                    const st = statusMap[order.status] || { text: order.status, cls: '' };
                    // 获取餐厅名
                    return fetch(`/api/restaurants/${order.restaurantId}`).then(r => r.json()).then(resp2 => {
                        const restName = resp2.data ? resp2.data.name : '餐厅#' + order.restaurantId;
                        // 获取订单项
                        return fetch(`/api/orders/${order.id}/items`).then(r => r.json()).then(resp3 => {
                            const items = resp3.data || [];
                            const itemsHtml = items.map(item => 
                                `<div class="item-row"><span>${item.dishName} × ${item.quantity}</span><span>¥${(item.price * item.quantity).toFixed(2)}</span></div>`
                            ).join('');
                            return { order, restName, itemsHtml, st };
                        });
                    });
                }).catch(() => {
                    return { order, restName: '餐厅#' + order.restaurantId, itemsHtml: '<div class="item-row" style="color:#999;">加载失败</div>', st };
                });

                Promise.all(promises).then(results => {
                    // 存一份数据供详情弹窗用
                    window._orderResults = results;
                    el.innerHTML = results.map(({ order, restName, itemsHtml, st }) => `
                        <div class="order-card card-enter" onclick="showDetail(${order.id})">
                            <div class="header">
                                <span class="order-no">🆔 ${order.orderNo}</span>
                                <span class="status ${st.cls}">${st.text}</span>
                            </div>
                            <div class="body">
                                ${itemsHtml}
                                ${st.step > 0 && st.step < 5 ? `
                                <div style="display:flex;gap:8px;justify-content:center;padding:12px 0 4px;border-top:1px solid #f5f5f5;margin-top:8px;">
                                    ${['💳','👨‍🍳','🚚','✅'].map((icon,i) => `
                                        <div style="display:flex;align-items:center;gap:4px;">
                                            <span style="font-size:18px;opacity:${i+1 <= st.step ? 1 : 0.3};">${icon}</span>
                                            ${i < 3 ? '<span style="color:'+(i+1 < st.step ? '#ff6b35' : '#eee')+';">━━</span>' : ''}
                                        </div>
                                    `).join('')}
                                </div>
                                ` : ''}
                                ${order.deliveryId ? `
                                <div id="deliveryInfo_${order.id}" style="margin-top:10px;padding:10px 14px;background:#f0f8ff;border-radius:8px;border-left:3px solid #4a90d9;font-size:13px;">
                                    <div style="display:flex;align-items:center;justify-content:space-between;">
                                        <span style="font-weight:bold;color:#4a90d9;">🚚 配送员信息</span>
                                        <span id="delPhone_${order.id}" style="color:#999;">加载中...</span>
                                    </div>
                                    <div style="margin-top:4px;display:flex;align-items:center;gap:10px;">
                                        <span style="color:#333;" id="delName_${order.id}">${order.deliveryName || '配送员'}</span>
                                        <span style="color:#ff6b35;font-size:12px;" id="delDuration_${order.id}">⏱ ${calcDuration(order.pickupTime, order.deliveredTime)}</span>
                                        <a id="delCallBtn_${order.id}" style="display:none;padding:4px 14px;background:#4a90d9;color:#fff;border-radius:20px;text-decoration:none;font-size:12px;" href="tel:">📞 联系配送员</a>
                                    </div>
                                </div>
                                ` : ''}
                                <div class="total">合计 ¥${order.totalAmount ? order.totalAmount.toFixed(2) : '0.00'}</div>
                            </div>
                            <div class="footer">
                                <span class="rest-name">🏪 ${restName}</span>
                                <span>${new Date(order.createTime).toLocaleString('zh-CN')}</span>
                            </div>
                        </div>
                    `).join('');

                // 为每个有配送员的订单加载配送员电话
                results.forEach(({ order }) => {
                    if (order.deliveryId) {
                        loadDeliveryPhone(order.id, order.deliveryId, order.deliveryName);
                    }
                });
                });
            }).catch(() => {
                el.innerHTML = '<div class="empty"><div class="icon">⚠️</div><p>加载失败，请确认后端已启动</p></div>';
            });
        }

        // ===== 加载配送员电话 =====
        function loadDeliveryPhone(orderId, deliveryId, deliveryName) {
            if (!deliveryId) return;
            fetch(`/api/users/${deliveryId}`).then(r => r.json()).then(resp => {
                if (resp.code === 200 && resp.data) {
                    const phone = resp.data.phone;
                    const nameEl = document.getElementById('delName_' + orderId);
                    const phoneEl = document.getElementById('delPhone_' + orderId);
                    const callBtn = document.getElementById('delCallBtn_' + orderId);
                    if (nameEl) nameEl.textContent = deliveryName || resp.data.nickname || '配送员';
                    if (phone && phoneEl) {
                        phoneEl.textContent = '📞 ' + phone;
                        if (callBtn) {
                            callBtn.href = 'tel:' + phone;
                            callBtn.style.display = 'inline-block';
                        }
                    } else if (phoneEl) {
                        phoneEl.textContent = '暂无电话';
                    }
                }
            }).catch(() => {});
        }

        // ===== 订单详情弹窗 =====
        function showDetail(orderId) {
            const overlay = document.getElementById('detailOverlay');
            const body = document.getElementById('detailBody');
            const title = document.getElementById('detailTitle');
            const orderNo = document.getElementById('detailOrderNo');

            const results = window._orderResults || [];
            const found = results.find(r => r.order.id === orderId);
            if (!found) { alert('订单数据不存在'); return; }

            const { order, restName, itemsHtml, st } = found;
            title.textContent = '📋 订单详情';
            orderNo.textContent = '🆔 ' + order.orderNo;
            const totalAmount = order.totalAmount ? order.totalAmount.toFixed(2) : '0.00';
            const createTime = order.createTime ? new Date(order.createTime).toLocaleString('zh-CN') : '-';
            const address = order.deliveryAddress || '未填写';
            const contact = (order.contactName || '未填写') + '  📞' + (order.contactPhone || '-');

            // 时间轴
            const timelineSteps = [
                { icon: '📝', label: '已下单', done: true },
                { icon: '💳', label: '已支付', done: st.step >= 1 },
                { icon: '👨‍🍳', label: '已接单', done: st.step >= 2 },
                { icon: '🚚', label: '配送中', done: st.step >= 3 },
                { icon: '✅', label: '已送达', done: st.step >= 4 }
            ];

            let html = `
                <!-- 状态与金额 -->
                <div class="detail-section">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
                        <span class="status ${st.cls}" style="padding:6px 16px;border-radius:20px;font-size:14px;font-weight:bold;">${st.text}</span>
                        <span style="font-size:24px;font-weight:bold;color:#ff6b35;">¥${totalAmount}</span>
                    </div>
                    <!-- 时间轴 -->
                    <div class="detail-timeline">
                        ${timelineSteps.map((s, i) => `
                            <div class="step ${s.done ? (i < timelineSteps.length-1 ? 'done' : 'active') : ''}">
                                <span class="icon" style="opacity:${s.done ? 1 : 0.3};">${s.icon}</span>
                                <span class="label">${s.label}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>

                <!-- 订单商品 -->
                <div class="detail-section">
                    <h4>🍽️ 订单商品 · ${restName}</h4>
                    ${itemsHtml}
                    <div class="info-row" style="border-top:1px solid #f0f0f0;padding-top:8px;margin-top:4px;">
                        <span class="label">配送费</span>
                        <span class="value">¥${(order.deliveryFee || 0).toFixed(2)}</span>
                    </div>
                    <div class="info-row" style="border-top:2px solid #ff6b35;padding-top:8px;margin-top:4px;">
                        <span class="label" style="font-weight:bold;">合计</span>
                        <span class="value price" style="font-size:18px;">¥${totalAmount}</span>
                    </div>
                </div>

                <!-- 配送信息 -->
                <div class="detail-section">
                    <h4>📍 配送信息</h4>
                    <div class="info-row"><span class="label">地址</span><span class="value">${address}</span></div>
                    <div class="info-row"><span class="label">联系人</span><span class="value">${contact}</span></div>
                    <div class="info-row"><span class="label">备注</span><span class="value">${order.remark || '无'}</span></div>
                    <div class="info-row"><span class="label">下单时间</span><span class="value">${createTime}</span></div>
                </div>
            `;

            // 配送员信息（含统计数据）
            if (order.deliveryId) {
                html += `
                <div class="detail-section">
                    <h4>🚚 配送员</h4>
                    <div id="detailDelivery_${order.id}">
                        <div class="info-row"><span class="label">姓名</span><span class="value" id="dd_name_${order.id}">${order.deliveryName || '配送员'}</span></div>
                        <div class="info-row"><span class="label">电话</span><span class="value" id="dd_phone_${order.id}">加载中...</span></div>
                        <div class="info-row"><span class="label">⏱ 配送耗时</span><span class="value" id="dd_duration_${order.id}" style="color:#ff6b35;font-weight:bold;">${calcDuration(order.pickupTime, order.deliveredTime)}</span></div>
                        <div class="delivery-stats" id="dd_stats_${order.id}">
                            <div class="stat-item"><div class="num">-</div><div class="lbl">总配送</div></div>
                            <div class="stat-item"><div class="num">-</div><div class="lbl">已完成</div></div>
                            <div class="stat-item"><div class="num">-</div><div class="lbl">进行中</div></div>
                        </div>
                    </div>
                </div>
                `;

                // 异步加载配送员详细数据
                fetch(`/api/users/${order.deliveryId}`).then(r => r.json()).then(resp => {
                    if (resp.code === 200 && resp.data) {
                        const d = resp.data;
                        document.getElementById('dd_name_' + order.id).textContent = d.nickname || d.username;
                        document.getElementById('dd_phone_' + order.id).textContent = '📞 ' + (d.phone || '暂无');
                    }
                }).catch(() => {});
                // 加载配送统计
                fetch(`/api/orders/delivery/${order.deliveryId}/stats`).then(r => r.json()).then(resp => {
                    if (resp.code === 200 && resp.data) {
                        const s = resp.data;
                        const statsEl = document.getElementById('dd_stats_' + order.id);
                        if (statsEl) {
                            statsEl.innerHTML = `
                                <div class="stat-item"><div class="num">${s.totalDeliveries}</div><div class="lbl">总配送单量</div></div>
                                <div class="stat-item"><div class="num">${s.completedDeliveries}</div><div class="lbl">已完成</div></div>
                                <div class="stat-item"><div class="num">${s.deliveringCount}</div><div class="lbl">配送中</div></div>
                            `;
                        }
                    }
                }).catch(() => {});
            }

            body.innerHTML = html;
            overlay.classList.add('show');
        }

        function closeDetail() {
            document.getElementById('detailOverlay').classList.remove('show');
        }

        // 配送耗时计算
        function calcDuration(pickupTime, deliveredTime) {
            if (!pickupTime) return '⌛ 配送中';
            const start = new Date(pickupTime).getTime();
            const end = deliveredTime ? new Date(deliveredTime).getTime() : Date.now();
            const diff = Math.floor((end - start) / 1000);
            if (diff < 0) return '--';
            if (diff < 60) return diff + '秒';
            const mins = Math.floor(diff / 60);
            const secs = diff % 60;
            if (mins < 60) return mins + '分' + secs + '秒';
            const hours = Math.floor(mins / 60);
            return hours + '时' + (mins % 60) + '分';
        }

        loadOrders();
    </script>
</body>
</html>
