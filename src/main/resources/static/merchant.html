<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>商家管理 - 外卖配送系统</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: #f0faf0; }
        .navbar { background: linear-gradient(135deg, #27ae60, #2ecc71); color: #fff; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 60px; box-shadow: 0 2px 12px rgba(39,174,96,0.3); }
        .navbar .logo { font-size: 20px; font-weight: bold; text-decoration: none; color: #fff; }
        .navbar .nav-right a { color: rgba(255,255,255,0.9); text-decoration: none; margin-left: 16px; font-size: 14px; padding: 6px 12px; border-radius: 4px; }
        .navbar .nav-right a:hover { background: rgba(255,255,255,0.15); }
        .container { max-width: 1000px; margin: 0 auto; padding: 24px; }
        .header-area { background: linear-gradient(135deg, #27ae60, #2ecc71); margin: -24px -24px 20px; padding: 20px 24px 10px; color: #fff; }
        .header-area .page-title { font-size: 22px; font-weight: bold; color: #fff; display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
        .header-area .page-title .shop-info { font-size: 14px; font-weight: normal; color: #fff; background: rgba(255,255,255,0.2); padding: 6px 16px; border-radius: 20px; }

        .tabs { display: flex; gap: 4px; margin-bottom: 20px; background: #fff; border-radius: 10px; padding: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .tabs .tab { flex: 1; padding: 12px; text-align: center; border: none; background: transparent; border-radius: 8px; cursor: pointer; font-size: 15px; color: #666; transition: all 0.2s; }
        .tabs .tab:hover { background: #f0faf0; }
        .tabs .tab.active { background: #27ae60; color: #fff; font-weight: bold; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 10px; }
        .toolbar .left { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

        .btn { padding: 8px 20px; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; transition: all 0.2s; }
        .btn-primary { background: #27ae60; color: #fff; }
        .btn-primary:hover { background: #219a52; }
        .btn-success { background: #27ae60; color: #fff; }
        .btn-success:hover { background: #219a52; }
        .btn-danger { background: #e74c3c; color: #fff; }
        .btn-danger:hover { background: #c0392b; }
        .btn-warning { background: #f39c12; color: #fff; }
        .btn-warning:hover { background: #d68910; }
        .btn-secondary { background: #95a5a6; color: #fff; }
        .btn-sm { padding: 5px 12px; font-size: 12px; }

        table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
        thead { background: #fafffa; }
        th { text-align: left; padding: 14px 16px; font-size: 13px; color: #888; font-weight: 600; border-bottom: 1px solid #eee; }
        td { padding: 12px 16px; font-size: 14px; color: #333; border-bottom: 1px solid #f5f5f5; }
        tr:hover td { background: #fafffa; }

        .shop-card { background: #fff; border-radius: 12px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); display: flex; gap: 20px; }
        .shop-card .avatar { width: 80px; height: 80px; border-radius: 12px; background: linear-gradient(135deg, #27ae60, #2ecc71); display: flex; align-items: center; justify-content: center; font-size: 36px; color: #fff; flex-shrink: 0; }
        .shop-card .info { flex: 1; }
        .shop-card .info h2 { font-size: 20px; color: #333; margin-bottom: 6px; }
        .shop-card .info .desc { color: #999; font-size: 14px; margin-bottom: 8px; }
        .shop-card .info .meta { display: flex; flex-wrap: wrap; gap: 16px; font-size: 14px; color: #888; }

        .status-badge { display: inline-block; padding: 2px 10px; border-radius: 12px; font-size: 12px; }
        .status-badge.on { background: #e8f5e9; color: #27ae60; }
        .status-badge.off { background: #fce4ec; color: #e74c3c; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
        .modal-overlay.show { display: flex; }
        .modal { background: #fff; border-radius: 12px; padding: 24px; width: 480px; max-width: 100%; max-height: 85vh; overflow-y: auto; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
        .modal h3 { font-size: 18px; color: #333; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid #eee; }
        .modal .form-group { margin-bottom: 14px; }
        .modal .form-group label { display: block; font-size: 13px; color: #666; margin-bottom: 4px; }
        .modal .form-group input, .modal .form-group textarea, .modal .form-group select { width: 100%; padding: 9px 12px; border: 1px solid #e0e0e0; border-radius: 6px; font-size: 14px; outline: none; }
        .modal .form-group input:focus, .modal .form-group textarea:focus, .modal .form-group select:focus { border-color: #27ae60; }
        .modal .form-row { display: flex; gap: 12px; }
        .modal .form-row .form-group { flex: 1; }
        .modal .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; padding-top: 16px; border-top: 1px solid #eee; }

        .empty-msg { text-align: center; padding: 40px; color: #999; }
        .loading { text-align: center; padding: 40px; color: #999; }

        .toast { position: fixed; top: 20px; right: 20px; padding: 14px 24px; border-radius: 8px; color: #fff; font-size: 14px; z-index: 300; display: none; animation: slideDown 0.3s; }
        .toast.success { background: #27ae60; }
        .toast.error { background: #e74c3c; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="/" class="logo">🏪 商家管理</a>
        <div class="nav-right">
            <a href="#" onclick="showPwdModal();return false;">🔑 修改密码</a>
            <a href="/" onclick="logout()">🚪 退出</a>
        </div>
    </nav>
    <div class="container">
        <div class="header-area">
            <div class="page-title">
                🏪 我的店铺
                <span class="shop-info" id="merchantInfo">未登录</span>
            </div>
            <!-- 餐厅信息 -->
            <div id="shopDisplay"></div>
        </div>

        <!-- 标签 -->
        <div class="tabs">
            <button class="tab active" onclick="switchTab('dishes')">🍽️ 菜品管理</button>
            <button class="tab" onclick="switchTab('categories')">📂 分类管理</button>
            <button class="tab" onclick="switchTab('shop')">🏪 店铺设置</button>
        </div>

        <!-- 菜品管理 -->
        <div class="tab-content active" id="tab-dishes">
            <div class="toolbar">
                <div class="left">
                    <select id="dishCatFilter" onchange="loadDishes()"><option value="">全部分类</option></select>
                </div>
                <button class="btn btn-success" onclick="showDishModal()">＋ 新增菜品</button>
            </div>
            <table>
                <thead><tr>
                    <th>菜品</th><th>描述</th><th>价格</th><th>库存</th><th>分类</th><th>状态</th><th>操作</th>
                </tr></thead>
                <tbody id="dishTableBody"></tbody>
            </table>
        </div>

        <!-- 分类管理 -->
        <div class="tab-content" id="tab-categories">
            <div class="toolbar">
                <div class="left"><span style="color:#999;">管理菜品分类</span></div>
                <button class="btn btn-success" onclick="showCatModal()">＋ 新增分类</button>
            </div>
            <table>
                <thead><tr><th>分类名称</th><th>排序</th><th>操作</th></tr></thead>
                <tbody id="catTableBody"></tbody>
            </table>
        </div>

        <!-- 店铺设置 -->
        <div class="tab-content" id="tab-shop">
            <div id="shopSettings"></div>
        </div>
    </div>

    <!-- 弹窗 -->
    <div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
        <div class="modal">
            <h3 id="modalTitle">新增</h3>
            <div id="modalBody"></div>
        </div>
    </div>

    <!-- 修改密码弹窗 -->
    <div class="modal-overlay" id="pwdModal" onclick="if(event.target===this)closePwdModal()">
        <div class="modal" style="max-width:380px;">
            <h3>🔑 修改密码</h3>
            <div class="form-group"><label>原密码</label><input type="password" id="pwd_old"></div>
            <div class="form-group"><label>新密码</label><input type="password" id="pwd_new"></div>
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closePwdModal()">取消</button>
                <button class="btn btn-primary" onclick="changePwd()">确认修改</button>
            </div>
            <div id="pwdMsg" style="margin-top:10px;font-size:13px;color:#e74c3c;display:none;"></div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        function getCurrentUser() {
            const u = localStorage.getItem('waimai_user');
            return u ? JSON.parse(u) : null;
        }

        const user = getCurrentUser();
        if (!user || user.role !== 'MERCHANT') {
            alert('请用商家账号登录！\n默认商家: merchant1 / 123456');
            location.href = '/login.html?redirect=/merchant.html';
        }
        document.getElementById('merchantInfo').textContent = '👤 ' + (user.nickname || user.username);

        let myRestaurant = null;
        let myCategories = [];

        function toast(msg, type) {
            const el = document.getElementById('toast');
            el.textContent = msg; el.className = 'toast ' + type; el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 2500);
        }

        function logout() { localStorage.removeItem('waimai_user'); location.href = '/'; }

        function closeModal() { document.getElementById('modalOverlay').classList.remove('show'); }
        function showPwdModal() { document.getElementById('pwdModal').classList.add('show'); document.getElementById('pwd_old').value=''; document.getElementById('pwd_new').value=''; document.getElementById('pwdMsg').style.display='none'; }
        function closePwdModal() { document.getElementById('pwdModal').classList.remove('show'); }
        function changePwd() {
            const oldPwd = document.getElementById('pwd_old').value.trim();
            const newPwd = document.getElementById('pwd_new').value.trim();
            const msg = document.getElementById('pwdMsg');
            if (!oldPwd || !newPwd) { msg.textContent = '请填写完整'; msg.style.display = 'block'; return; }
            fetch('/api/users/password', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userId: user.id, oldPassword: oldPwd, newPassword: newPwd }) })
            .then(r => r.json()).then(resp => {
                if (resp.code === 200) { alert('✅ 修改成功，请重新登录'); logout(); }
                else { msg.textContent = resp.message || '修改失败'; msg.style.display = 'block'; }
            }).catch(() => { msg.textContent = '网络错误'; msg.style.display = 'block'; });
        }

        function switchTab(name) {
            document.querySelectorAll('.tab, .tab-content').forEach(el => el.classList.remove('active'));
            document.querySelector(`.tab[onclick*="'${name}'"]`).classList.add('active');
            document.getElementById('tab-' + name).classList.add('active');
            if (name === 'dishes') loadDishes();
            if (name === 'shop') loadShopSettings();
        }

        // ===== 加载我的餐厅 =====
        function loadMyRestaurant() {
            fetch(`/api/restaurants?mode=all`).then(r => r.json()).then(resp => {
                if (resp.code !== 200) return;
                const list = resp.data.filter(r => r.merchantId === user.id);
                if (list.length === 0) {
                    document.getElementById('shopDisplay').innerHTML = `
                        <div class="shop-card" style="text-align:center;padding:40px;display:block;">
                            <p style="color:#999;margin-bottom:16px;">你还没有餐厅，请联系管理员创建</p>
                        </div>`;
                    return;
                }
                myRestaurant = list[0];
                renderShopDisplay();
                loadCategories();
                loadDishes();
                loadCatFilter();
                loadShopSettings();
            });
        }

        function renderShopDisplay() {
            if (!myRestaurant) return;
            const r = myRestaurant;
            document.getElementById('shopDisplay').innerHTML = `
                <div class="shop-card card-enter">
                    <div class="avatar">${r.name.charAt(0)}</div>
                    <div class="info">
                        <h2>${r.name}</h2>
                        <div class="desc">${r.description || '暂无介绍'}</div>
                        <div class="meta">
                            <span>⭐ ${r.rating || '5.0'}</span>
                            <span>配送费 ¥${r.deliveryFee || '0'}</span>
                            <span>📞 ${r.phone || '-'}</span>
                            <span>📍 ${r.address || '-'}</span>
                            <span class="status-badge ${r.active ? 'on' : 'off'}">${r.active ? '营业中' : '已关闭'}</span>
                            <span style="color:#999;">菜品: <strong id="dishCount">0</strong></span>
                        </div>
                    </div>
                </div>
            `;
        }

        // ===== 分类管理 =====
        function loadCategories() {
            if (!myRestaurant) return;
            fetch(`/api/categories/restaurant/${myRestaurant.id}`).then(r => r.json()).then(resp => {
                myCategories = (resp.code === 200 && resp.data) ? resp.data : [];
                const tbody = document.getElementById('catTableBody');
                if (myCategories.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="3" class="empty-msg">暂无分类，点击右上角新增</td></tr>';
                    return;
                }
                tbody.innerHTML = myCategories.map(c => `
                    <tr>
                        <td><strong>${c.name}</strong></td>
                        <td>${c.sortOrder || 0}</td>
                        <td>
                            <div class="btn btn-danger btn-sm" onclick="deleteCat(${c.id})">🗑️ 删除</div>
                        </td>
                    </tr>
                `).join('');
            });
        }

        function loadCatFilter() {
            const sel = document.getElementById('dishCatFilter');
            sel.innerHTML = '<option value="">全部分类</option>' +
                myCategories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
        }

        function showCatModal() {
            document.getElementById('modalTitle').textContent = '＋ 新增分类';
            document.getElementById('modalBody').innerHTML = `
                <div class="form-group"><label>分类名称 *</label><input type="text" id="cat_name"></div>
                <div class="form-group"><label>排序（数字越小越靠前）</label><input type="number" id="cat_sort" value="0"></div>
                <div class="modal-actions">
                    <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                    <button class="btn btn-primary" onclick="saveCat()">保存</button>
                </div>
            `;
            document.getElementById('modalOverlay').classList.add('show');
        }

        function saveCat() {
            const name = document.getElementById('cat_name').value.trim();
            if (!name) { toast('请输入分类名称', 'error'); return; }
            fetch('/api/categories', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, restaurantId: myRestaurant.id, sortOrder: parseInt(document.getElementById('cat_sort').value) || 0 })
            }).then(r => r.json()).then(resp => {
                if (resp.code === 200) { toast('创建成功', 'success'); closeModal(); loadCategories(); loadCatFilter(); }
                else { toast(resp.message || '创建失败', 'error'); }
            });
        }

        function deleteCat(id) {
            if (!confirm('确定删除该分类？')) return;
            fetch(`/api/categories/${id}`, { method: 'DELETE' }).then(r => r.json()).then(resp => {
                if (resp.code === 200) { toast('删除成功', 'success'); loadCategories(); loadCatFilter(); }
                else { toast('删除失败', 'error'); }
            });
        }

        // ===== 菜品管理 =====
        function loadDishes() {
            if (!myRestaurant) return;
            const catId = document.getElementById('dishCatFilter').value;
            const url = catId ? `/api/dishes/category/${catId}?mode=all` : `/api/dishes/restaurant/${myRestaurant.id}?mode=all`;
            fetch(url).then(r => r.json()).then(resp => {
                const tbody = document.getElementById('dishTableBody');
                const count = document.getElementById('dishCount');
                if (resp.code !== 200 || !resp.data || resp.data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" class="empty-msg">暂无菜品</td></tr>';
                    if (count) count.textContent = '0';
                    return;
                }
                if (count) count.textContent = resp.data.length;
                const catMap = {};
                myCategories.forEach(c => catMap[c.id] = c.name);
                tbody.innerHTML = resp.data.map(d => `
                    <tr>
                        <td><strong>${d.name}</strong></td>
                        <td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#999;font-size:13px;">${d.description || '-'}</td>
                        <td style="color:#27ae60;font-weight:bold;font-size:16px;">¥${d.price}</td>
                        <td>${d.stock}</td>
                        <td>${catMap[d.categoryId] || '未分类'}</td>
                        <td><span class="status-badge ${d.active ? 'on' : 'off'}">${d.active ? '在售' : '下架'}</span></td>
                        <td>
                            <div style="display:flex;gap:4px;">
                                <button class="btn btn-primary btn-sm" onclick="showDishModal(${d.id})">✏️ 编辑</button>
                                <button class="btn btn-warning btn-sm" onclick="toggleDishStatus(${d.id}, ${!d.active})">${d.active ? '下架' : '上架'}</button>
                                <button class="btn btn-danger btn-sm" onclick="deleteDish(${d.id})">🗑️</button>
                            </div>
                        </td>
                    </tr>
                `).join('');
            });
        }

        function showDishModal(id) {
            document.getElementById('modalTitle').textContent = id ? '✏️ 编辑菜品' : '＋ 新增菜品';
            const overlay = document.getElementById('modalOverlay');
            const body = document.getElementById('modalBody');

            const catOpts = myCategories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');

            if (id) {
                fetch(`/api/dishes/${id}`).then(r => r.json()).then(resp => {
                    if (resp.code !== 200) { toast('加载失败', 'error'); return; }
                    const d = resp.data;
                    body.innerHTML = dishFormHtml(d, catOpts);
                    overlay.classList.add('show');
                });
            } else {
                body.innerHTML = dishFormHtml(null, catOpts);
                overlay.classList.add('show');
            }
        }

        function dishFormHtml(d, catOpts) {
            return `
                <div class="form-group"><label>菜品名称 *</label><input type="text" id="dish_name" value="${d ? d.name : ''}"></div>
                <div class="form-group"><label>描述</label><textarea id="dish_desc" rows="2">${d ? (d.description || '') : ''}</textarea></div>
                <div class="form-row">
                    <div class="form-group"><label>价格 (¥) *</label><input type="number" step="0.01" id="dish_price" value="${d ? d.price : ''}"></div>
                    <div class="form-group"><label>库存</label><input type="number" id="dish_stock" value="${d ? d.stock : 999}"></div>
                </div>
                <div class="form-group"><label>分类</label>
                    <select id="dish_categoryId">
                        <option value="">无分类</option>
                        ${catOpts.replace(`value="${d ? d.categoryId : ''}"`, `value="${d ? d.categoryId : ''}" selected`)}
                    </select>
                </div>
                <div class="form-group"><label>状态</label>
                    <select id="dish_active">
                        <option value="true" ${d && d.active !== false ? 'selected' : ''}>在售</option>
                        <option value="false" ${d && d.active === false ? 'selected' : ''}>下架</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                    <button class="btn btn-primary" onclick="saveDish(${d ? d.id : ''})">保存</button>
                </div>
            `;
        }

        function saveDish(id) {
            const name = document.getElementById('dish_name').value.trim();
            const price = parseFloat(document.getElementById('dish_price').value);
            if (!name) { toast('菜品名称不能为空', 'error'); return; }
            if (!price || price <= 0) { toast('请输入有效价格', 'error'); return; }
            const data = {
                name: name,
                description: document.getElementById('dish_desc').value.trim(),
                price: price,
                stock: parseInt(document.getElementById('dish_stock').value) || 0,
                categoryId: parseInt(document.getElementById('dish_categoryId').value) || null,
                restaurantId: myRestaurant.id,
                active: document.getElementById('dish_active').value === 'true'
            };
            const url = id ? `/api/dishes/${id}` : '/api/dishes';
            fetch(url, { method: id ? 'PUT' : 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) })
            .then(r => r.json()).then(resp => {
                if (resp.code === 200) { toast(id ? '更新成功' : '创建成功', 'success'); closeModal(); loadDishes(); }
                else { toast(resp.message || '操作失败', 'error'); }
            });
        }

        function toggleDishStatus(id, newStatus) {
            fetch(`/api/dishes/${id}`).then(r => r.json()).then(resp => {
                if (resp.code !== 200) return;
                const d = resp.data;
                d.active = newStatus;
                fetch(`/api/dishes/${id}`, { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(d) })
                .then(r => r.json()).then(r2 => {
                    if (r2.code === 200) { toast(newStatus ? '已上架' : '已下架', 'success'); loadDishes(); }
                });
            });
        }

        function deleteDish(id) {
            if (!confirm('确定删除该菜品？')) return;
            fetch(`/api/dishes/${id}`, { method: 'DELETE' }).then(r => r.json()).then(resp => {
                if (resp.code === 200) { toast('删除成功', 'success'); loadDishes(); }
                else { toast('删除失败', 'error'); }
            });
        }

        // ===== 店铺设置 =====
        function loadShopSettings() {
            if (!myRestaurant) return;
            const r = myRestaurant;
            document.getElementById('shopSettings').innerHTML = `
                <div style="background:#fff;border-radius:12px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,0.06);">
                    <div class="form-group"><label>餐厅名称</label><input type="text" id="s_name" value="${r.name}" class="s-input"></div>
                    <div class="form-group"><label>描述</label><textarea id="s_desc" rows="2" class="s-input">${r.description || ''}</textarea></div>
                    <div class="form-row" style="display:flex;gap:12px;">
                        <div class="form-group" style="flex:1;"><label>电话</label><input type="text" id="s_phone" value="${r.phone || ''}" class="s-input"></div>
                        <div class="form-group" style="flex:1;"><label>配送费 (¥)</label><input type="number" step="0.01" id="s_fee" value="${r.deliveryFee || 0}" class="s-input"></div>
                    </div>
                    <div class="form-group"><label>地址</label><input type="text" id="s_addr" value="${r.address || ''}" class="s-input"></div>
                    <div class="form-group"><label>营业状态</label>
                        <select id="s_active" class="s-input">
                            <option value="true" ${r.active ? 'selected' : ''}>营业中</option>
                            <option value="false" ${!r.active ? 'selected' : ''}>已关闭</option>
                        </select>
                    </div>
                    <button class="btn btn-primary" onclick="saveShop()" style="margin-top:8px;padding:10px 32px;">💾 保存设置</button>
                </div>
            `;
            // 动态添加样式
            const style = document.createElement('style');
            style.textContent = '.s-input { width:100%; padding:9px 12px; border:1px solid #e0e0e0; border-radius:6px; font-size:14px; outline:none; } .s-input:focus { border-color:#27ae60; }';
            document.head.appendChild(style);
        }

        function saveShop() {
            if (!myRestaurant) return;
            const data = {
                name: document.getElementById('s_name').value.trim(),
                description: document.getElementById('s_desc').value.trim(),
                phone: document.getElementById('s_phone').value.trim(),
                deliveryFee: parseFloat(document.getElementById('s_fee').value) || 0,
                address: document.getElementById('s_addr').value.trim(),
                active: document.getElementById('s_active').value === 'true',
                merchantId: myRestaurant.merchantId,
                rating: myRestaurant.rating
            };
            if (!data.name) { toast('餐厅名称不能为空', 'error'); return; }
            fetch(`/api/restaurants/${myRestaurant.id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            }).then(r => r.json()).then(resp => {
                if (resp.code === 200) {
                    toast('保存成功', 'success');
                    myRestaurant = resp.data;
                    renderShopDisplay();
                } else {
                    toast(resp.message || '保存失败', 'error');
                }
            });
        }

        // ===== 初始化 =====
        loadMyRestaurant();
    </script>
</body>
</html>
